
<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://w3schools.com">
    <title>FB Phone No with OTP</title>
    <style>
        .container {
            max-width: 300px;
            margin: auto;
            padding-top:40px;
            text-align:center;
        }
        #number, #verificationcode {
            width: 100%;
            padding: 10px;
            font-size: 20px;
            margin-bottom: 5px;
            outline: none;
        }
        #recaptcha-container {
            margin-bottom: 5px;
        }
        #send, #verify {
            width: 100%;
            height: 40px;
            outline: none;
            display:none;
        }
        #show {
            width: 100%;
            height: 40px;
            outline: none;
        }
        .p-conf, .n-conf {
            width: 100%;
            border: 2px solid green;
            border-radius: 4px;
            padding: 8px 10px;
            margin: 4px 0px;
            background-color: rgba(0, 249, 12, 0.5);
            display: none;
        }
        .n-conf {
            border-color: red;
            background-color: rgba(255, 0, 4, 0.5);
        }
        /* تحسينات إضافية للمظهر */
        .step-2 {
            display: none;
        }
    </style>
</head>

<body>
    <div class="container class="w3-card-4 w3-padding w3-round"">
        <div id="info" class="w3-margin-bottom"></div>
        
        <!-- الخطوة الأولى: إدخال رقم الهاتف -->
        <div id="step1">
            <h4 class="w3-text-teal">التحقق من رقم الهاتف</h4>
            <input type="tel" id="number" class="w3-input w3-border w3-round" placeholder="+966500000000">
            <div id="recaptcha-container"></div>
            <button id="show" class="w3-button w3-teal w3-round" onclick="sendOTP()">إرسال رمز التحقق</button>
        </div>

        <!-- الخطوة الثانية: إدخال الرمز المرسل (تظهر لاحقاً) -->
        <div id="step2" class="step-2">
            <h4 class="w3-text-teal">أدخل الرمز (OTP)</h4>
            <input type="number" id="verificationcode" class="w3-input w3-border w3-round" placeholder="000000">
            <button id="verify" class="w3-button w3-green w3-round" style="display: block;" onclick="verifyOTP()">تأكيد الرمز</button>
        </div>

        <!-- رسائل النجاح والفشل -->
        <div id="success-msg" class="p-conf">تم التحقق بنجاح!</div>
        <div id="fail-msg" class="n-conf">الرمز غير صحيح، حاول مجدداً.</div>
    </div>

    <script>
        // دالة محاكاة إرسال الرمز
        function sendOTP() {
            var phone = document.getElementById( number ).value;
            if(phone.trim() === "") {
                alert("الرجاء إدخال رقم الهاتف أولاً");
                return;
            }
            
            // إخفاء الخطوة الأولى وإظهار الخطوة الثانية
            document.getElementById( step1 ).style.display =  none ;
            document.getElementById( step2 ).style.display =  block ;
            document.getElementById( info ).innerHTML = "تم إرسال الرمز إلى: " + phone;
        }

        // دالة محاكاة التحقق من الرمز
        function verifyOTP() {
            var code = document.getElementById( verificationcode ).value;
            var success = document.getElementById( success-msg );
            var fail = document.getElementById( fail-msg );

            // افتراضياً: الرمز الصحيح للمحاكاة هو 1234
            if(code === "1234") {
                success.style.display =  block ;
                fail.style.display =  none ;
                document.getElementById( step2 ).style.display =  none ;
            } else {
                fail.style.display =  block ;
                success.style.display =  none ;
            }
        }
    </script>
</body>
</html>
