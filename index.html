<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MultiMiner - لوحة التحكم</title>
    <style>
        :root {
            --bg-color: #0d0e12;
            --card-bg: #161820;
            --accent-color: #00e676;
            --text-primary: #ffffff;
            --text-secondary: #90a4ae;
            --btn-blue: #2196f3;
            --btn-orange: #ff9800;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        .dashboard {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 480px;
            border-radius: 28px;
            padding: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            border: 1px solid #252936;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-icon {
            font-size: 24px;
            color: var(--accent-color);
        }

        .logo-text {
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        .status-badge {
            background: rgba(244, 67, 54, 0.1);
            color: #f44336;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-badge.active {
            background: rgba(0, 230, 118, 0.1);
            color: var(--accent-color);
        }

        .pulse {
            width: 8px;
            height: 8px;
            background-color: #f44336;
            border-radius: 50%;
        }

        .status-badge.active .pulse {
            background-color: var(--accent-color);
            animation: blink 1.5s infinite;
        }

        .balance-box {
            background: linear-gradient(135deg, #1e2230 0%, #1a1d29 100%);
            border: 1px solid #2c3247;
            border-radius: 20px;
            padding: 22px;
            text-align: center;
            margin-bottom: 20px;
        }

        .balance-label {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .crypto-amount {
            font-size: 26px;
            font-weight: 700;
            color: var(--text-primary);
            font-family: monospace;
            margin-bottom: 4px;
            word-break: break-all;
        }

        .fiat-amount {
            font-size: 16px;
            color: var(--accent-color);
            font-weight: 600;
            margin-bottom: 12px;
        }

        .market-info {
            font-size: 11px;
            color: var(--text-secondary);
            border-top: 1px solid #2c3247;
            padding-top: 10px;
        }

        .start-mining-container {
            margin-bottom: 20px;
        }

        .btn-start-mining {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #00e676 0%, #00b0ff 100%);
            color: #0d0e12;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 230, 118, 0.3);
            transition: all 0.2s;
        }

        .btn-start-mining:disabled {
            background: #1f2330;
            color: #607d8b;
            border: 1px solid #2c3247;
            box-shadow: none;
            cursor: not-allowed;
        }

        .stats-strip {
            background-color: #1f2330;
            border-radius: 14px;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            font-size: 13px;
        }

        .hash-rate {
            color: var(--text-primary);
            font-weight: bold;
        }

        .grid-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .card-option {
            background: #1c1f2b;
            border: 1px solid #282f42;
            border-radius: 18px;
            padding: 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .card-icon {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .card-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 14px;
        }

        .btn {
            width: 100%;
            padding: 11px;
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-blue { background-color: var(--btn-blue); }
        .btn-blue:hover { background-color: #1976d2; }

        .btn-orange { background-color: var(--btn-orange); }
        .btn-orange:hover { background-color: #f57c00; }

        .btn:disabled {
            background-color: #424242 !important;
            color: #757575;
            cursor: not-allowed;
        }

        .meta-text {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 10px;
        }

        @keyframes blink {
            0% { opacity: 0.3; }
            50% { opacity: 1; }
            100% { opacity: 0.3; }
        }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="header">
        <div class="logo-section">
            <span class="logo-icon">⚡</span>
            <span class="logo-text">MultiMiner</span>
        </div>
        <div class="status-badge" id="statusBadge">
            <div class="pulse"></div>
            <span id="statusText">متوقف</span>
        </div>
    </div>

    <div class="balance-box">
        <div class="balance-label">إجمالي الرصيد المستخرج (BTC)</div>
        <div class="crypto-amount" id="cryptoBalance">0.000000017756</div>
        <div class="fiat-amount" id="fiatBalance">$1,331.70 USD</div>
        <div class="market-info">سعر البيتكوين المرجعي المتزامن: $75,000</div>
    </div>

    <div class="start-mining-container">
        <button class="btn-start-mining" id="startMiningBtn">اضغط لبدء التعدين (6 ساعات)</button>
    </div>

    <div class="stats-strip">
        <span>المؤقت: <span id="timeCounter">00:00:00</span></span>
        <span>سرعة الهاش: <span class="hash-rate" id="hashRateText">0 TH/s</span></span>
    </div>

    <div class="grid-options">
        <div class="card-option">
            <div class="card-icon">📺</div>
            <div class="card-title">مشاهدة الإعلانات</div>
            <button class="btn btn-blue" id="actionAdBtn">مطالبة بمكافأة</button>
            <div class="meta-text">عداد المشاهدة: <span id="adCounterText">0</span></div>
        </div>

        <div class="card-option">
            <div class="card-icon">⛏️</div>
            <div class="card-title">ترقية العتاد</div>
            <button class="btn btn-orange" id="actionUpgradeBtn">شراء طاقة</button>
            <div class="meta-text">المستوى الحالي: <span id="levelText">1</span></div>
        </div>
    </div>
</div>

<script>
    let accountBtc = 0.000000017756; 
    const standardBtcPrice = 75000;
    let totalAds = 0;
    let minerLevel = 1;
    
    let isMiningActive = false;
    let currentMiningIncrement = 0.000000000135; 
    let remainingTimerSeconds = 0; 

    const cryptoBalanceEl = document.getElementById('cryptoBalance');
    const fiatBalanceEl = document.getElementById('fiatBalance');
    const timeCounterEl = document.getElementById('timeCounter');
    const hashRateTextEl = document.getElementById('hashRateText');
    const startMiningBtn = document.getElementById('startMiningBtn');
    const statusBadge = document.getElementById('statusBadge');
    const statusText = document.getElementById('statusText');
    
    const actionAdBtn = document.getElementById('actionAdBtn');
    const actionUpgradeBtn = document.getElementById('actionUpgradeBtn');
    const adCounterTextEl = document.getElementById('adCounterText');
    const levelTextEl = document.getElementById('levelText');

    function refreshMetricsDisplay() {
        cryptoBalanceEl.textContent = accountBtc.toFixed(12);
        let calculatedFiat = accountBtc * standardBtcPrice;
        fiatBalanceEl.textContent = "$" + calculatedFiat.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2}) + " USD";
    }

    startMiningBtn.addEventListener('click', () => {
        isMiningActive = true;
        remainingTimerSeconds = 21600; 
        
        startMiningBtn.disabled = true;
        startMiningBtn.textContent = "التعدين نشط حالياً";
        statusBadge.classList.add('active');
        statusText.textContent = "نشط ومتصل";
        hashRateTextEl.textContent = (120 + (minerLevel * 15)) + " TH/s";
    });

    setInterval(() => {
        if (isMiningActive && remainingTimerSeconds > 0) {
            accountBtc += currentMiningIncrement;
            refreshMetricsDisplay();

            remainingTimerSeconds--;
