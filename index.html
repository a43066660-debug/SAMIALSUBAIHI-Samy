<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MultiMiner - لوحة التحكم</title>
    <style>
        :root {
            --bg-color: #0d0e12;
            --card-bg: #161820;
            --accent-color: #00e676;
            --text-primary: #ffffff;
            --text-secondary: #90a4ae;
            --btn-blue: #2196f3;
            --btn-orange: #ff9800;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        .dashboard {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 480px;
            border-radius: 28px;
            padding: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            border: 1px solid #252936;
        }

        /* رأس الصفحة والنظام */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-icon {
            font-size: 24px;
            color: var(--accent-color);
        }

        .logo-text {
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        .status-badge {
            background: rgba(0, 230, 118, 0.1);
            color: var(--accent-color);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .pulse {
            width: 8px;
            height: 8px;
            background-color: var(--accent-color);
            border-radius: 50%;
            animation: blink 1.5s infinite;
        }

        /* كرت عرض الرصيد الإجمالي */
        .balance-box {
            background: linear-gradient(135deg, #1e2230 0%, #1a1d29 100%);
            border: 1px solid #2c3247;
            border-radius: 20px;
            padding: 22px;
            text-align: center;
            margin-bottom: 20px;
        }

        .balance-label {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .crypto-amount {
            font-size: 26px;
            font-weight: 700;
            color: var(--text-primary);
            font-family: monospace;
            margin-bottom: 4px;
            word-break: break-all;
        }

        .fiat-amount {
            font-size: 16px;
            color: var(--accent-color);
            font-weight: 600;
            margin-bottom: 12px;
        }

        .market-info {
            font-size: 11px;
            color: var(--text-secondary);
            border-top: 1px solid #2c3247;
            padding-top: 10px;
        }

        /* شريط معدل التعدين السريع */
        .stats-strip {
            background-color: #1f2330;
            border-radius: 14px;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            font-size: 13px;
        }

        .hash-rate {
            color: var(--text-primary);
            font-weight: bold;
        }

        /* شبكة التحكم والتفاعل */
        .grid-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .card-option {
            background: #1c1f2b;
            border: 1px solid #282f42;
            border-radius: 18px;
            padding: 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .card-icon {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .card-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 14px;
        }

        .btn {
            width: 100%;
            padding: 11px;
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-blue { background-color: var(--btn-blue); }
        .btn-blue:hover { background-color: #1976d2; }

        .btn-orange { background-color: var(--btn-orange); }
        .btn-orange:hover { background-color: #f57c00; }

        .btn:disabled {
            background-color: #424242 !important;
            color: #757575;
            cursor: not-allowed;
        }

        .meta-text {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 10px;
        }

        @keyframes blink {
            0% { opacity: 0.3; }
            50% { opacity: 1; }
            100% { opacity: 0.3; }
        }
    </style>
</head>
<body>

<div class="dashboard">
    <!-- الرأس هيدر المنصة -->
    <div class="header">
        <div class="logo-section">
            <span class="logo-icon">⚡</span>
            <span class="logo-text">MultiMiner</span>
        </div>
        <div class="status-badge">
            <div class="pulse"></div>
            <span>نشط ومتصل</span>
        </div>
    </div>

    <!-- كرت الرصيد والعداد -->
    <div class="balance-box">
        <div class="balance-label">إجمالي الرصيد المستخرج (BTC)</div>
        <div class="crypto-amount" id="cryptoBalance">0.000000000000</div>
        <div class="fiat-amount" id="fiatBalance">$0.00 USD</div>
        <div class="market-info">سعر البيتكوين المرجعي المتزامن: $75,000</div>
    </div>

    <!-- شريط معلومات التعدين الحالي -->
    <div class="stats-strip">
        <span>المؤقت: <span id="timeCounter">05:59:37</span></span>
        <span>سرعة الهاش: <span class="hash-rate" id="hashRateText">120 TH/s</span></span>
    </div>

    <!-- كروت التحكم الأساسية -->
    <div class="grid-options">
        <!-- الخيار الأول: مشاهدة الإعلانات لدعم السرعة -->
        <div class="card-option">
            <div class="card-icon">📺</div>
            <div class="card-title">مشاهدة الإعلانات</div>
            <button class="btn btn-blue" id="actionAdBtn">مطالبة بمكافأة</button>
            <div class="meta-text">عداد المشاهدة: <span id="adCounterText">0</span></div>
        </div>

        <!-- الخيار الثاني: متجر ترقية الأجهزة -->
        <div class="card-option">
            <div class="card-icon">⛏️</div>
            <div class="card-title">ترقية العتاد</div>
            <button class="btn btn-orange" id="actionUpgradeBtn">شراء طاقة</button>
            <div class="meta-text">المستوى الحالي: <span id="levelText">1</span></div>
        </div>
    </div>
</div>

<script>
    // القيم الحسابية المبدئية للعدادات
    let accountBtc = 0.000000017756;
    const standardBtcPrice = 75000;
    let totalAds = 0;
    let minerLevel = 1;
    
    // مقدار الزيادة التلقائية في الرصيد بكل ثانية
    let currentMiningIncrement = 0.000000000008; 
    let remainingTimerSeconds = 21577; // الوقت المتبقي بالثواني الموازية لـ 05:59:37

    // ربط العناصر البرمجية بالواجهة
    const cryptoBalanceEl = document.getElementById('cryptoBalance');
    const fiatBalanceEl = document.getElementById('fiatBalance');
    const timeCounterEl = document.getElementById('timeCounter');
    const hashRateTextEl = document.getElementById('hashRateText');
    const actionAdBtn = document.getElementById('actionAdBtn');
    const actionUpgradeBtn = document.getElementById('actionUpgradeBtn');
    const adCounterTextEl = document.getElementById('adCounterText');
    const levelTextEl = document.getElementById('levelText');

    // دالة التحديث الرسومية الفورية للأرقام والمبالغ
    function refreshMetricsDisplay() {
        cryptoBalanceEl.textContent = accountBtc.toFixed(12);
        let calculatedFiat = accountBtc * standardBtcPrice;
        fiatBalanceEl.textContent = "$" + calculatedFiat.toFixed(2) + " USD";
    }

    // العداد التلقائي (تحديث الرصيد والمؤقت ثانية بثانية)
    setInterval(() => {
        accountBtc += currentMiningIncrement;
        refreshMetricsDisplay();

        if (remainingTimerSeconds > 0) {
            remainingTimerSeconds--;
            let hours = Math.floor(remainingTimerSeconds / 3600).toString().padStart(2, '0');
            let minutes = Math.floor((remainingTimerSeconds % 3600) / 60).toString().padStart(2, '0');
            let seconds = (remainingTimerSeconds % 60).toString().padStart(2, '0');
            timeCounterEl.textContent = `${hours}:${minutes}:${seconds}`;
        }
    }, 1000);

    // حدث زر مشاهدة الإعلانات والمكافآت (معالج غير متزامن كلياً لمنع تعليق المتصفح)
    actionAdBtn.addEventListener('click', async () => {
        actionAdBtn.disabled = true;
        actionAdBtn.textContent = "جاري التحقق...";

        // محاكاة الاتصال الفوري والانتظار دون تجميد واجهة الـ UI
        await new Promise(resolve => setTimeout(resolve, 600));

        accountBtc += 0.000000003500;
        totalAds++;
        adCounterTextEl.textContent = totalAds;
        refreshMetricsDisplay();

        actionAdBtn.disabled = false;
        actionAdBtn.textContent = "مطالبة بمكافأة";
    });

    // حدث زر ترقية طاقة وأجهزة العتاد لزيادة سرعة العداد التلقائي
    actionUpgradeBtn.addEventListener('click', async () => {
        actionUpgradeBtn.disabled = true;
