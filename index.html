<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>مكون الطقس</title>
    <style>
        @import url( https://googleapis.com );
        
        body {
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 90vh;
            background-color: #ffffff;
            font-family:  Cairo , sans-serif;
        }

        /* مطابقة أبعاد وتصميم البطاقة المستطيلة المقربة تماماً مثل الصورة */
        .twk-weather-widget {
            display: inline-flex;
            align-items: center;
            background-color: rgba(240, 243, 248, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 35px; 
            padding: 14px 28px 14px 32px; 
            gap: 16px; 
            user-select: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            direction: rtl;
            width: max-content;
            box-sizing: border-box;
        }
        
        .twk-main-content {
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }

        .twk-text {
            color: #2c2c2c;
            font-size: 22px; /* حجم خط مقرب وواضح جداً للعين */
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }
        
        .twk-sun-icon {
            width: 26px; 
            height: 26px;
            background-color: #FFB300;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 10px rgba(255, 179, 0, 0.8);
            flex-shrink: 0;
        }
        
        /* تدوير السهم لليسار ليتطابق مع الصورة ويصبح زراً تفاعلياً للتحديث */
        .twk-arrow-container {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 24px; 
            height: 24px;
            cursor: pointer;
            transition: transform 0.2s ease, opacity 0.2s ease;
            flex-shrink: 0;
            transform: rotate(0deg); /* اتجاه مطابق للصورة */
        }

        .twk-arrow-container:hover {
            opacity: 0.7;
        }

        /* أنيميشن حركة الدوران للسهم عند النقر وبدء التحديث الحقيقي */
        .twk-arrow-container.updating {
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(-360deg); }
        }

        .twk-arrow-svg {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>
<body>

    <div class="twk-weather-widget" id="weather-widget">
        <div class="twk-main-content">
            <span class="twk-sun-icon"></span>
            <span class="twk-text">
                <span id="twk-temp" style="font-weight: 700; display: inline-block; direction: ltr;">30</span>
                <span id="twk-status"> درجة - صحو في الرياض الآن</span>
            </span>
        </div>
        
        <!-- السهم المطابق للصورة تماماً كزر تحديث فوري فسيولوجي عند الضغط -->
        <span class="twk-arrow-container" id="refresh-btn" onclick="getLiveLocationWeather()" title="تحديث الطقس">
            <svg class="twk-arrow-svg" viewBox="0 0 24 24" fill="none" xmlns="http://w3.org">
                <path d="M15 19L8 12L15 5" stroke="#8E8E93" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </span>
    </div>

<script>
    // دالة مساعدة لترجمة إحداثيات خطوط الطول والعرض لاسم مدينة حقيقي عبر نظام التسمية المفتوح
    async function getCityName(lat, lon) {
        try {
            const response = await fetch(`https://openstreetmap.org{lat}&lon=${lon}&accept-language=ar`);
            const data = await response.json();
            return data.address.city || data.address.town || data.address.state || "موقعك الحالي";
        } catch (e) {
            return "موقعك الحالي";
        }
    }

    async function fetchWeatherData(lat, lon, cityName) {
        try {
            const weatherUrl = `https://open-meteo.com{lat}&longitude=${lon}&current=temperature_2m,apparent_temperature,weather_code&timezone=auto`;
            const res = await fetch(weatherUrl);
            const data = await res.json();
            
            const realTemp = Math.round(data.current.apparent_temperature);
            const code = data.current.weather_code;
            
            let status = "صحو"; 
            if (code > 0 && code <= 3) status = "غائم جزئياً"; 
            else if (code >= 45 && code <= 48) status = "ضبابي"; 
            else if (code >= 51 && code <= 67) status = "أمطار"; 
            else if (code >= 95) status = "عواصف";
            
            // تحديث واجهة المكون فوراً بالقيم الفسيولوجية والمدينة الحقيقية
            document.getElementById( twk-temp ).innerText = realTemp;
            document.getElementById( twk-status ).innerHTML = " درجة - " + status + " في " + cityName + " الآن";
        } catch (e) {
            console.log("خطأ في جلب بيانات الطقس.");
        }
    }

    function getLiveLocationWeather() {
        const btn = document.getElementById( refresh-btn );
        if(btn) btn.classList.add( updating );
        
        // استخدام مستشعر تحديد الموقع الفعلي المدمج بالمتصفح لتفادي مشاكل الحجب التلقائي للـ IP
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(async (position) => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                
                // جلب اسم المدينة الحقيقي باللغة العربية
                const cityName = await getCityName(lat, lon);
                // جلب تحديث الطقس الفوري
                await fetchWeatherData(lat, lon, cityName);
                
                if(btn) btn.classList.remove( updating );
            }, async (error) => {
                // في حال رفض المستخدم مشاركة الموقع أو تعطل المستشعر، يتم التحديث بناءً على إحداثيات الرياض كخيار احتياطي آمن
                await fetchWeatherData(24.6877, 46.7219, "الرياض");
                if(btn) btn.classList.remove( updating );
            });
        } else {
            // المتصفح لا يدعم مستشعر الموقع
            fetchWeatherData(24.6877, 46.7219, "الرياض");
            if(btn) btn.classList.remove( updating );
        }
    }
    
    // تشغيل جلب البيانات الحقيقية مباشرة عند فتح الصفحة
    getLiveLocationWeather();
</script>

</body>
</html>
