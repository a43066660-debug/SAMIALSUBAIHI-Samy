<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MultiMiner - لوحة التحكم</title>
    <style>
        :root {
            --bg-color: #0d0e12;
            --card-bg: #161820;
            --accent-color: #00e676;
            --text-primary: #ffffff;
            --text-secondary: #90a4ae;
            --btn-blue: #2196f3;
            --btn-orange: #ff9800;
            --btn-purple: #9c27b0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Segoe UI, Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        .dashboard {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 480px;
            border-radius: 28px;
            padding: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            border: 1px solid #252936;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-icon {
            font-size: 24px;
            color: var(--accent-color);
        }

        .logo-text {
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        .status-badge {
            background: rgba(244, 67, 54, 0.1);
            color: #f44336;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-badge.active {
            background: rgba(0, 230, 118, 0.1);
            color: var(--accent-color);
        }

        .pulse {
            width: 8px;
            height: 8px;
            background-color: #f44336;
            border-radius: 50%;
        }

        .status-badge.active .pulse {
            background-color: var(--accent-color);
            animation: blink 1.5s infinite;
        }
