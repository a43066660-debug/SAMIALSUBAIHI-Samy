<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MultiMiner Top Section</title>
    <style>
        body {
            background-color: #0b0e14;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 15px;
        }
        .container {
            background-color: #121620;
            border-radius: 16px;
            padding: 20px;
            border: 1px solid #1a2235;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .status {
            background-color: rgba(46, 204, 113, 0.15);
            color: #2ecc71;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
        }
        .title {
            font-size: 20px;
            font-weight: bold;
            color: #f1c40f;
        }
        .balance-box {
            text-align: center;
            background-color: #171d2c;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
        }
        .balance-title { color: #8a99ad; font-size: 12px; }
        .btc-val { font-size: 24px; font-weight: bold; margin: 10px 0; letter-spacing: 1px; }
        .usd-val { color: #2ecc71; font-weight: bold; font-size: 16px; }
        .ref-price { color: #58667e; font-size: 11px; margin-top: 8px; }
        .mining-status {
            text-align: center;
            background-color: #171d2c;
            padding: 12px;
            border-radius: 12px;
            color: #9b59b6;
            font-weight: bold;
            font-size: 15px;
            margin-bottom: 15px;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: #bdc3c7;
            background-color: #171d2c;
            padding: 12px;
            border-radius: 12px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <span class="status">● نشط ومتصل</span>
        <span class="title">MultiMiner ⚡</span>
    </div>

    <div class="balance-box">
        <div class="balance-title">إجمالي الرصيد المستخرج (BTC)</div>
        <div id="btcBalance" class="btc-val">0.000000369640</div>
        <div id="usdBalance" class="usd-val">USD $0.03</div>
        <div class="ref-price">سعر البيتكوين المرجعي المتزامن: $75,000</div>
    </div>

    <div class="mining-status">التعدين نشط حالياً</div>

    <div class="info-row">
        <div>المؤقت: <span id="timer">05:19:36</span></div>
        <div>سرعة الهاش: <span id="hashRate">120 TH/s</span></div>
    </div>
</div>

<script>
    // دالة يستدعيها تطبيق كوديلار لزيادة السرعة برمجياً
    function setSpeed(multiply) {
        document.getElementById('hashRate').innerText = (120 * multiply) + " TH/s";
    }
    
    // دالة يستدعيها تطبيق كوديلار لإضافة وقت التعدين
    function addTime() {
        document.getElementById('timer').innerText = "07:19:36"; 
    }
</script>
</body>
</html>
