<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>مكون الطقس الديناميكي</title>
    <style>
        @import url( https://googleapis.com );
        
        body {
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 90vh;
            background-color: #ffffff;
            font-family:  Cairo , sans-serif;
        }

        /* مطابقة أبعاد وتصميم البطاقة المستطيلة المقربة تماماً */
        .twk-weather-widget {
            display: inline-flex;
            align-items: center;
            background-color: rgba(240, 243, 248, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 35px; 
            padding: 14px 28px 14px 32px; 
            gap: 16px; 
            user-select: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            direction: rtl;
            width: max-content;
            box-sizing: border-box;
        }
        
        .twk-main-content {
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }

        .twk-text {
            color: #2c2c2c;
            font-size: 22px; 
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }
        
        .twk-sun-icon {
            width: 26px; 
            height: 26px;
            background-color: #FFB300;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 10px rgba(255, 179, 0, 0.8);
            flex-shrink: 0;
        }
        
        /* السهم التفاعلي للتحديث */
        .twk-arrow-container {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 24px; 
            height: 24px;
            cursor: pointer;
            transition: transform 0.2s ease;
            flex-shrink: 0;
        }

        /* تأثير الدوران السريع عند جلب الطقس الحقيقي للموقع */
        .twk-arrow-container.updating {
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(-360deg); }
        }

        .twk-arrow-svg {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>
<body>

    <div class="twk-weather-widget" id="weather-widget">
        <div class="twk-main-content">
            <span class="twk-sun-icon"></span>
            <span class="twk-text">
                <span id="twk-temp" style="font-weight: 700; display: inline-block; direction: ltr;">--</span>
                <span id="twk-status"> درجة - تحديد موقع الجهاز...</span>
            </span>
        </div>
        
        <!-- زر السهم لتحديث المدينة والطقس الفعلي للجهاز بشكل متكرر حقيقي -->
        <span class="twk-arrow-container" id="refresh-btn" onclick="getLiveLocationWeather()" title="تحديث الطقس">
            <svg class="twk-arrow-svg" viewBox="0 0 24 24" fill="none" xmlns="http://w3.org">
                <path d="M15 19L8 12L15 5" stroke="#8E8E93" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </span>
    </div>

<script>
    async function getLiveLocationWeather() {
        const btn = document.getElementById( refresh-btn );
        if(btn) btn.classList.add( updating );
        
        let lat = null;
        let lon = null;
        let city = "موقعك الحالي";

        // المحاولة الأولى والمستقرة: جلب إحداثيات وموقع الجهاز الفعلي عبر ipapi.co
        try {
            const locRes = await fetch( https://ipapi.co );
            if(locRes.ok) {
                const locData = await locRes.json();
                lat = locData.latitude;
                lon = locData.longitude;
                city = locData.city || "موقعك الحالي";
            }
        } catch (e) {
            // المحاولة الثانية الاحتياطية في حال حظر الخادم الأول على المتصفحات الموضعية
            try {
                const backupRes = await fetch( https://ipwho.is );
                const backupData = await backupRes.json();
                if(backupData.success) {
                    lat = backupData.latitude;
                    lon = backupData.longitude;
                    city = backupData.city || "موقعك الحالي";
                }
            } catch (err) {
                console.log("Searching alternative networks...");
            }
        }

        // إذا فشل العثور على الإحداثيات، يتم الاستعانة بخادم wttr المباشر لتحديد المدينة وجلب طقسها تلقائياً
        if (!lat || !lon) {
            try {
                const res = await fetch( https://wttr.in );
                const data = await res.json();
                const realTemp = Math.round(data.current_condition[0].FeelsLikeC);
                city = data.nearest_area[0].region[0].value || "موقعك الحالي";
                
                const weatherDesc = data.current_condition[0].weatherDesc[0].value.toLowerCase();
                let status = "صحو";
                if (weatherDesc.includes("cloud") || weatherDesc.includes("overcast")) status = "غائم جزئياً";
                else if (weatherDesc.includes("rain") || weatherDesc.includes("shower")) status = "أمطار";
                else if (weatherDesc.includes("fog") || weatherDesc.includes("mist")) status = "ضبابي";
                else if (weatherDesc.includes("thunder") || weatherDesc.includes("storm")) status = "عواصف";

                document.getElementById( twk-temp ).innerText = realTemp;
                document.getElementById( twk-status ).innerHTML = " درجة - " + status + " في " + city + " الآن";
                if(btn) btn.classList.remove( updating );
                return;
            } catch(wttrErr) {
                // تصفير وعرض خطأ الشبكة دون إظهار مدينة معينة افتراضياً
                document.getElementById( twk-temp ).innerText = "00";
                document.getElementById( twk-status ).innerHTML = " درجة - تحقق من اتصال جهازك بالإنترنت";
                if(btn) btn.classList.remove( updating );
                return;
            }
        }

        // عند نجاح جلب خطوط الطول والعرض لجهازك، يتم استدعاء بيانات الطقس الفسيولوجية المطابقة
        try {
            const weatherUrl = `https://open-meteo.com{lat}&longitude=${lon}&current=temperature_2m,apparent_temperature,weather_code&timezone=auto`;
            const res = await fetch(weatherUrl);
            const data = await res.json();
            
            const realTemp = Math.round(data.current.apparent_temperature);
            const code = data.current.weather_code;
            
            let status = "صحو"; 
            if (code > 0 && code <= 3) status = "غائم جزئياً"; 
            else if (code >= 45 && code <= 48) status = "ضبابي"; 
            else if (code >= 51 && code <= 67) status = "أمطار"; 
            else if (code >= 95) status = "عواصف";
            
            document.getElementById( twk-temp ).innerText = realTemp;
            document.getElementById( twk-status ).innerHTML = " درجة - " + status + " في " + city + " الآن";
        } catch (e) {
            document.getElementById( twk-temp ).innerText = "--";
            document.getElementById( twk-status ).innerHTML = " درجة - فشل تحديث البيانات الحية";
        } finally {
            if(btn) {
                setTimeout(() => {
                    btn.classList.remove( updating );
                }, 600);
            }
        }
    }
    
    // تشغيل جلب طقس مدينة جهازك الحالية فوراً بمجرد فتح الملف
    getLiveLocationWeather();
</script>

</body>
</html>
