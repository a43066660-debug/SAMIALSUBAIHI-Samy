<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTC Flow Miner</title>
    
    <style>
        :root { --main-color: #4a148c; --accent-color: #ff4081; --bg-color: #fce4ec; }
        body { background-color: var(--bg-color); font-family: sans-serif; margin: 0; padding: 0; direction: rtl; }
        .header { background: white; padding: 25px; border-radius: 0 0 30px 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        .balance { font-size: 32px; font-weight: bold; color: var(--accent-color); margin: 5px 0; font-family: monospace; }
        .usd-balance { font-size: 18px; font-weight: bold; color: #00c853; margin-bottom: 10px; font-family: monospace; }
        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .card { background: white; border-radius: 20px; padding: 15px; text-align: center; box-shadow: 0 5px 10px rgba(0,0,0,0.05); }
        .btn-mine { grid-column: span 2; background: linear-gradient(45deg, #00c853, #b2ff59); color: white; padding: 20px; border-radius: 20px; font-size: 20px; font-weight: bold; border: none; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,200,83,0.3); }
        .btn-mine:disabled { background: #9e9e9e; color: #fff; cursor: not-allowed; box-shadow: none; }
        .btn-blue { background: #2196f3; color: white; border: none; padding: 10px; border-radius: 10px; width: 100%; cursor: pointer; margin-top: 10px; }
        .btn-orange { background: #ff9800; color: white; border: none; padding: 10px; border-radius: 10px; width: 100%; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="header">
    <div style="color: #888;">إجمالي الرصيد (BTC)</div>
    <div class="balance" id="btc-balance">0.000000000000</div>
    <!-- العداد الجديد المقابل بالدولار الأمريكي -->
    <div class="usd-balance" id="usd-balance">$0.00</div>
    <div style="font-size: 12px; color: #666;">سعر السوق الثابت: $75,000</div>
</div>

<div class="main-grid">
    <button class="btn-mine" id="mine-btn" onclick="startMining()">⚡ ابدأ التعدين الآن</button>
    <div class="card"><div>📺</div><b>مشاهدة إعلان</b><button class="btn-blue" onclick="alert('سيتم ربطه بـ Admob لاحقاً')">مشاهدة</button></div>
    <div class="card"><div>🛒</div><b>متجر القوة</b><button class="btn-orange" onclick="alert('قريباً')">شراء</button></div>
</div>

<script>
    // السعر الثابت المعتمد في الحسبة
    const btcPrice = 75000;

    let currentBal = parseFloat(localStorage.getItem('btc_balance')) || 0;
    
    // تحديث واجهة الـ BTC والـ USD عند فتح الصفحة مباشرة
    document.getElementById('btc-balance').innerText = currentBal.toFixed(12);
    document.getElementById('usd-balance').innerText = `$${(currentBal * btcPrice).toFixed(2)}`;

    let miningInterval;

    window.startMining = function() {
        const btn = document.getElementById('mine-btn');
        let duration = 21600; // 6 ساعات بالثواني

        btn.disabled = true;

        miningInterval = setInterval(() => {
            if (duration > 0) {
                // إضافة القيمة الجديدة لإنتاج 5 دولار يومياً (بناءً على السعر 75,000$)
                currentBal += 0.000000000772; 
                
                // تحديث القيم وحفظها
                document.getElementById('btc-balance').innerText = currentBal.toFixed(12);
                document.getElementById('usd-balance').innerText = `$${(currentBal * btcPrice).toFixed(2)}`;
                
                localStorage.setItem('btc_balance', currentBal);

                let hrs = Math.floor(duration / 3600);
                let mins = Math.floor((duration % 3600) / 60);
                let secs = duration % 60;
                
                let displayTime = `${hrs.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;

                btn.innerText = `⏳ جاري التعدين... (${displayTime})`;
                duration--;
            } else {
                clearInterval(miningInterval);
                btn.innerText = "⚡ ابدأ التعدين الآن";
                btn.disabled = false;
            }
        }, 1000);
    };
</script>
</body>
</html>
