<!doctype html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://w3schools.com">
    <title>FB Phone No with OTP</title>
    <style>
        body {
            background-color: #f5f5f5;
            font-family: sans-serif;
        }
        .container {
            max-width: 350px;
            margin: auto;
            padding-top: 40px;
            text-align: center;
        }
        #number, #verificationcode {
            width: 100%;
            padding: 12px;
            font-size: 20px;
            margin-bottom: 12px;
            outline: none;
            text-align: center;
        }
        #recaptcha-container {
            margin-bottom: 12px;
            display: flex;
            justify-content: center;
        }
        #show, #verify {
            width: 100%;
            height: 45px;
            outline: none;
        }
        .p-conf, .n-conf {
            width: 100%;
            border: 2px solid green;
            border-radius: 4px;
            padding: 10px;
            margin: 12px 0px;
            background-color: rgba(0, 249, 12, 0.15);
            display: none;
            color: green;
            font-weight: bold;
        }
        .n-conf {
            border-color: red;
            background-color: rgba(255, 0, 4, 0.15);
            color: red;
        }
        .step-2 {
            display: none;
        }
    </style>
</head>
 
<body>
    <div class="container w3-card-4 w3-padding w3-round w3-white w3-margin-top">
        <div id="info" class="w3-margin-bottom w3-text-gray"></div>
        
        <!-- الخطوة الأولى: رقم الهاتف -->
        <div id="step1">
            <h4 class="w3-text-teal w3-bold">التحقق من رقم الهاتف</h4>
            <p class="w3-small w3-text-grey">يرجى كتابة الرقم مع رمز الدولة (مثال: +966500000000)</p>
            <input type="tel" id="number" class="w3-input w3-border w3-round" placeholder="+966500000000">
            
            <!-- أداة الحماية المطلوبة من Firebase -->
            <div id="recaptcha-container"></div>
            
            <button id="show" class="w3-button w3-teal w3-round" onclick="sendOTP()">إرسال رمز التحقق</button>
        </div>
 
        <!-- الخطوة الثانية: رمز OTP -->
        <div id="step2" class="step-2">
            <h4 class="w3-text-teal w3-bold">أدخل الرمز المستلم</h4>
            <input type="number" id="verificationcode" class="w3-input w3-border w3-round" placeholder="000000">
            <button id="verify" class="w3-button w3-green w3-round" onclick="verifyOTP()">تأكيد الرمز</button>
        </div>
 
        <!-- الرسائل الإشعارية -->
        <div id="success-msg" class="p-conf">تم التحقق وتأكيد الرقم بنجاح!</div>
        <div id="fail-msg" class="n-conf">الرمز غير صحيح، يرجى إعادة المحاولة.</div>
    </div>
 
    <!-- استدعاء وتكوين مكتبات Firebase الحديثة المتوافقة مع المتصفح والـ WebView -->
    <script type="module">
        import { initializeApp } from "https://gstatic.com";
        import { getAuth, RecaptchaVerifier, signInWithPhoneNumber } from "https://gstatic.com";

        // بيانات مشروعك الحقيقي SRSR المتوافق مع التطبيق والويب
        const firebaseConfig = {
            apiKey: "AIzaSyBPd0MpQY3I9NekjULv0zFVvXFw-v-xakI",
            authDomain: "://firebaseapp.com",
            databaseURL: "https://firebaseio.com",
            projectId: "srsr-45951",
            storageBucket: "://appspot.com",
            messagingSenderId: "356276956422",
            appId: "1:356276956422:web:b9987e15d222b420794287",
            measurementId: "G-FZ5ED1WPXW"
        };

        // تهيئة النظام
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        auth.languageCode = 'ar'; // تحديد لغة واجهة الـ Recaptcha باللغة العربية

        let confirmationResult;

        // إعداد أداة التوثيق الأمني المرئي البشري عند تحميل الصفحة
        window.onload = function() {
            window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
                'size': 'normal',
                'callback': (response) => {
                    // تم التحقق بنجاح من أمان العملية
                }
            });
            window.recaptchaVerifier.render();
        };

        // وظيفة إرسال كود الـ SMS
        window.sendOTP = function() {
            const phoneNumber = document.getElementById('number').value;
            if (phoneNumber.trim() === "" || !phoneNumber.startsWith('+')) {
                alert("الرجاء إدخال رقم الهاتف كاملاً مع رمز الدولة مبدوءاً بعلامة +");
                return;
            }

            const appVerifier = window.recaptchaVerifier;

            signInWithPhoneNumber(auth, phoneNumber, appVerifier)
                .then((result) => {
                    window.confirmationResult = result;
                    
                    document.getElementById('step1').style.display = 'none';
                    document.getElementById('step2').style.display = 'block';
                    document.getElementById('info').innerHTML = "تم إرسال كود التحقق بنجاح إلى: " + phoneNumber;
                    document.getElementById('fail-msg').style.display = 'none';
                }).catch((error) => {
                    alert("تعذر إرسال الرمز: " + error.message);
                    console.error(error);
                });
        }

        // وظيفة التحقق وتأكيد كود الـ OTP
        window.verifyOTP = function() {
            const code = document.getElementById('verificationcode').value;
            const successMsg = document.getElementById('success-msg');
            const failMsg = document.getElementById('fail-msg');

            if (code.trim() === "" || code.length < 6) {
                alert("يرجى إدخال كود التحقق المكون من 6 أرقام بشكل صحيح");
                return;
            }

            window.confirmationResult.confirm(code)
                .then((result) => {
                    const user = result.user;
                    successMsg.style.display = 'block';
                    failMsg.style.display = 'none';
                    document.getElementById('step2').style.display = 'none';
                    document.getElementById('info').innerHTML = "تم الدخول بنجاح! رقم الحساب الموحد: " + user.uid;
                }).catch((error) => {
                    failMsg.style.display = 'block';
                    successMsg.style.display = 'none';
                    console.error(error);
                });
        }
    </script>
</body>
</html>
