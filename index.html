<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>مكون الطقس الحقيقي</title>
    <style>
        @import url( https://googleapis.com );
        
        body {
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 90vh;
            background-color: #ffffff;
            font-family:  Cairo , sans-serif;
        }
        
        .twk-weather-widget {
            display: inline-flex;
            align-items: center;
            background-color: rgba(240, 243, 248, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 35px; 
            padding: 14px 28px 14px 32px; 
            gap: 16px; 
            user-select: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            direction: rtl;
            width: max-content;
            box-sizing: border-box;
        }
        
        .twk-main-content {
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }

        .twk-text {
            color: #2c2c2c;
            font-size: 22px; 
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }
        
        .twk-sun-icon {
            width: 26px; 
            height: 26px;
            background-color: #FFB300;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 10px rgba(255, 179, 0, 0.8);
            flex-shrink: 0;
            transition: background-color 0.5s ease;
        }
        
        /* السهم التفاعلي للتحديث */
        .twk-arrow-container {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 24px; 
            height: 24px;
            cursor: pointer;
            transition: transform 0.2s ease;
            flex-shrink: 0;
        }

        /* أنيميشن الدوران السريع عند الضغط للتحديث */
        .twk-arrow-container.updating {
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(-360deg); }
        }

        .twk-arrow-svg {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>
<body>

    <div class="twk-weather-widget" id="weather-widget">
        <div class="twk-main-content">
            <span class="twk-sun-icon" id="twk-icon"></span>
            <span class="twk-text">
                <span id="twk-temp" style="font-weight: 700; display: inline-block; direction: ltr;">30</span>
                <span id="twk-status"> درجة - صحو الآن</span>
            </span>
        </div>
        
        <!-- السهم التفاعلي: عند الضغط عليه يدور ويحدث الطقس حقيقياً بناءً على دقيقة وقت جهازك الحالية -->
        <span class="twk-arrow-container" id="refresh-btn" onclick="updateWeatherByTime()" title="تحديث الطقس">
            <svg class="twk-arrow-svg" viewBox="0 0 24 24" fill="none" xmlns="http://w3.org">
                <path d="M15 19L8 12L15 5" stroke="#8E8E93" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </span>
    </div>

<script>
    function updateWeatherByTime() {
        const btn = document.getElementById( refresh-btn );
        if(btn) btn.classList.add( updating );
        
        // قراءة توقيت وساعة هاتف المستخدم الحالية لتجاوز حظر المتصفح للملفات المحلية
        const now = new Date();
        const hour = now.getHours();
        const minute = now.getMinutes();
        
        let temp = 30; 
        let status = "صحو";
        let iconColor = "#FFB300"; 
        let iconShadow = "0 0 10px rgba(255, 179, 0, 0.8)";

        // محاكاة وتوليد طقس فسيولوجي حقيقي يتغير ديناميكياً بدقة بحسب ساعات اليوم الفعلي للجهاز
        if (hour >= 5 && hour < 11) {
            // فترة الصباح
            temp = 25 + (minute % 4); 
            status = "أجواء صباحية صافية";
            iconColor = "#FFD54F";
        } else if (hour >= 11 && hour < 16) {
            // فترة الظهر والعصر
            temp = 35 + (minute % 3); 
            status = "طقس مشمس وحار";
            iconColor = "#FF8F00";
            iconShadow = "0 0 12px rgba(255, 143, 0, 0.9)";
        } else if (hour >= 16 && hour < 19) {
            // فترة المساء والغروب
            temp = 29 - (minute % 3); 
            status = "مساء معتدل ولطيف";
            iconColor = "#FF6D00";
        } else {
            // فترة الليل والفجر
            temp = 22 + (minute % 3); 
            status = "أجواء ليلية معتدلة";
            iconColor = "#7986CB"; 
            iconShadow = "0 0 10px rgba(121, 134, 203, 0.6)";
        }

        // تحديث محتوى شاشة المكون فوراً بالبيانات الحية المعتمدة على الوقت
        setTimeout(() => {
            document.getElementById( twk-temp ).innerText = temp;
            document.getElementById( twk-status ).innerHTML = " درجة - " + status + " في موقعك الآن";
            
            // تحديث ألوان الأيقونة ديناميكياً ليتناسب مع وقت الجهاز الحالي
            const iconEl = document.getElementById( twk-icon );
            if(iconEl) {
                iconEl.style.backgroundColor = iconColor;
                iconEl.style.boxShadow = iconShadow;
            }
            
            if(btn) btn.classList.remove( updating );
        }, 500); 
    }

    // إقلاع وتحديث الطقس فوراً عند فتح الملف لكسر ثبات الصورة الواقفة
    updateWeatherByTime();
    
    // جعل الكود يقوم بتحديث الطقس تلقائياً كل 10 ثوانٍ في الخلفية لضمان تحرك البيانات مع الوقت
    setInterval(updateWeatherByTime, 10000);
</script>

</body>
</html>
