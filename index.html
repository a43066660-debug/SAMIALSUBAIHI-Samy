<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>واجهة إرسال الرسائل - Twilio</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background-color: #fff; padding: 25px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #333; margin-bottom: 20px; }
        input, textarea, button { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
        button { background-color: #28a745; color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #218838; }
        #status { font-weight: bold; padding: 10px; border-radius: 5px; display: none; }
        .success { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

<div class="container">
    <h2>منظومة إرسال SMS</h2>
    
    <!-- خانة رقم المستلم -->
    <input type="text" id="toMobile" placeholder="رقم المستلم بالصيغة الدولية (مثل +966...)">
    
    <!-- خانة نص الرسالة -->
    <textarea id="smsBody" rows="4" placeholder="اكتب نص الرسالة هنا..."></textarea>
    
    <!-- زر الإرسال -->
    <button onclick="sendSMS()">إرسال الرسالة الآن</button>
    
    <!-- مربع الحالة -->
    <div id="status"></div>
</div>

<script>
function sendSMS() {
    const to = document.getElementById('toMobile').value;
    const body = document.getElementById('smsBody').value;
    const statusDiv = document.getElementById('status');
    
    // --- بيانات حسابك في تويليو (قم بتعبئتها هنا بدقة) ---
    const accountSid = 'AC8d2dfa3ea5098c0f2298a93b4a155bc7'; 
    const base64Auth = 'QUM4ZDJkZmEzZWE1MDk4YzBmMjI5N2M3OWU3OW...'; // كود الـ Basic الكامل الخاص بك هنا
    const senderName = 'COMPANY'; // ضع الاسم النصي المسجل والموثق في حسابك هنا بدلاً من الرقم
    
    if(!to || !body) {
        showStatus('يرجى ملء جميع الخانات المتاحة', 'error');
        return;
    }

    statusDiv.style.display = 'block';
    statusDiv.className = '';
    statusDiv.innerText = 'جاري الإرسال الفوري...';

    const url = `https://twilio.com{accountSid}/Messages.json`;
    
    // إعداد البيانات التي سيتم إرسالها بالطريقة الصحيحة (Form Urlencoded)
    const formData = new URLSearchParams();
    formData.append('From', senderName);
    formData.append('To', to);
    formData.append('Body', body);

    fetch(url, {
        method: 'POST',
        headers: {
            'Authorization': 'Basic ' + base64Auth,
            'Content-Type': 'application/x-www-form-urlencoded'
        },
        body: formData.toString()
    })
    .then(response => {
        if (response.status === 201) {
            showStatus('تم إرسال الرسالة بنجاح 🎉', 'success');
        } else {
            showStatus('فشل الإرسال، تحقق من البيانات أو توثيق الاسم الرقمي', 'error');
        }
    })
    .catch(error => {
        showStatus('حدث خطأ أثناء الاتصال بالشبكة', 'error');
    });
}

function showStatus(text, type) {
    const statusDiv = document.getElementById('status');
    statusDiv.style.display = 'block';
    statusDiv.className = type;
    statusDiv.innerText = text;
}
</script>

</body>
</html>
