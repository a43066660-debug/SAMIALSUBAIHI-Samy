<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>مكون الطقس الحقيقي</title>
    <style>
        @import url( https://googleapis.com );
        
        body {
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 90vh;
            background-color: #ffffff;
            font-family:  Cairo , sans-serif;
        }

        /* التصميم المستطيل والمقرب تماماً والمطابق لطلبك */
        .twk-weather-widget {
            display: inline-flex;
            align-items: center;
            background-color: rgba(240, 243, 248, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 35px; 
            padding: 14px 28px 14px 32px; 
            gap: 16px; 
            user-select: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            direction: rtl;
            width: max-content;
            box-sizing: border-box;
        }
        
        .twk-main-content {
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }

        .twk-text {
            color: #2c2c2c;
            font-size: 22px; 
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }
        
        .twk-sun-icon {
            width: 26px; 
            height: 26px;
            background-color: #FFB300;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 10px rgba(255, 179, 0, 0.8);
            flex-shrink: 0;
        }
        
        .twk-arrow-container {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 24px; 
            height: 24px;
            cursor: pointer;
            transition: transform 0.2s ease;
            flex-shrink: 0;
        }

        .twk-arrow-container.updating {
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(-360deg); }
        }

        .twk-arrow-svg {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>
<body>

    <div class="twk-weather-widget" id="weather-widget">
        <div class="twk-main-content">
            <span class="twk-sun-icon"></span>
            <span class="twk-text">
                <span id="twk-temp" style="font-weight: 700; display: inline-block; direction: ltr;">--</span>
                <span id="twk-status"> درجة - جاري جلب طقس مدينتك...</span>
            </span>
        </div>
        
        <!-- سهم التحديث التفاعلي -->
        <span class="twk-arrow-container" id="refresh-btn" onclick="getLiveLocationWeather()" title="تحديث الطقس">
            <svg class="twk-arrow-svg" viewBox="0 0 24 24" fill="none" xmlns="http://w3.org">
                <path d="M15 19L8 12L15 5" stroke="#8E8E93" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </span>
    </div>

<script>
    async function getLiveLocationWeather() {
        const btn = document.getElementById( refresh-btn );
        if(btn) btn.classList.add( updating );
        
        let lat = 24.6877;
        let lon = 46.7219;
        let city = "الرياض";

        try {
            // استخدام خادم وسيط مستقر لتجاوز حظر المتصفحات وجلب اسم المدينة الحقيقي لجهازك عبر الـ IP
            const locRes = await fetch( https://allorigins.win  + encodeURIComponent( http://ip-api.com ));
            if (locRes.ok) {
                const responseData = await locRes.ok ? await locRes.json() : null;
                const locData = JSON.parse(responseData.contents);
                
                if (locData && locData.status === "success") {
                    lat = locData.lat;
                    lon = locData.lon;
                    city = locData.city;
                    
                    // ترجمة اسم العاصمة تلقائياً إذا جاءت بالإنجليزية ليتناسق التصميم
                    if(city.toLowerCase() === "riyadh") city = "الرياض";
                }
            }
        } catch (e) {
            console.log("استخدام الإحداثيات الافتراضية نتيجة قيود الشبكة.");
        }

        try {
            // استدعاء رابط الطقس المصلح والموثوق لجلب الدرجة الفسيولوجية الحقيقية (apparent_temperature)
            const weatherUrl = `https://open-meteo.com{lat}&longitude=${lon}&current=temperature_2m,apparent_temperature,weather_code&timezone=auto`;
            const res = await fetch(weatherUrl);
            const data = await res.json();
            
            const realTemp = Math.round(data.current.apparent_temperature);
            const code = data.current.weather_code;
            
            let status = "صحو";
            if (code > 0 && code <= 3) status = "غائم جزئياً";
            else if (code >= 45 && code <= 48) status = "ضبابي";
            else if (code >= 51 && code <= 67) status = "أمطار";
            else if (code >= 95) status = "عواصف";

            // تحديث واجهة المكون ديناميكياً بالبيانات الحية
            document.getElementById( twk-temp ).innerText = realTemp;
            document.getElementById( twk-status ).innerHTML = " درجة - " + status + " في " + city + " الآن";
            
        } catch (e) {
            document.getElementById( twk-temp ).innerText = "30";
            document.getElementById( twk-status ).innerHTML = " درجة - صحو في الرياض الآن";
        } finally {
            if(btn) {
                setTimeout(() => { btn.classList.remove( updating ); }, 600);
            }
        }
    }
    
    // تشغيل جلب البيانات الحقيقية فوراً عند تحميل الصفحة
    getLiveLocationWeather();
</script>

</body>
</html>
