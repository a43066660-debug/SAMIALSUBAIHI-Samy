<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MultiMiner - لوحة التحكم</title>
    <style>
        :root {
            --bg-color: #0d0e12;
            --card-bg: #161820;
            --accent-color: #00e676;
            --text-primary: #ffffff;
            --text-secondary: #90a4ae;
            --btn-blue: #2196f3;
            --btn-orange: #ff9800;
            --btn-purple: #9c27b0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Segoe UI, Tahoma, Geneva, Verdana, sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: fixed;
            touch-action: none;
            padding: 15px 15px 85px 15px;
        }

        .dashboard {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 480px;
            border-radius: 28px;
            padding: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            border: 1px solid #252936;
            display: none;
        }

        .dashboard.active-page {
            display: block;
        }

        .page-title {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
            color: var(--text-primary);
        }

        .placeholder-card {
            background: #1c1f2b;
            border: 1px solid #282f42;
            border-radius: 18px;
            padding: 30px 20px;
            text-align: center;
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.6;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-icon {
            font-size: 24px;
            color: var(--accent-color);
        }

        .logo-text {
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        .status-badge {
            background: rgba(244, 67, 54, 0.1);
            color: #f44336;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-badge.active {
            background: rgba(0, 230, 118, 0.1);
            color: var(--accent-color);
        }

        .pulse {
            width: 8px;
            height: 8px;
            background-color: #f44336;
            border-radius: 50%;
        }

        .status-badge.active .pulse {
            background-color: var(--accent-color);
            animation: blink 1.5s infinite;
        }

        .balance-box {
            background: linear-gradient(135deg, #1e2230 0%, #1a1d29 100%);
            border: 1px solid #2c3247;
            border-radius: 20px;
            padding: 22px;
            text-align: center;
            margin-bottom: 20px;
        }

        .balance-label {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .crypto-amount {
            font-size: 26px;
            font-weight: 700;
            color: var(--text-primary);
            font-family: monospace;
            margin-bottom: 4px;
            word-break: break-all;
        }

        .fiat-amount {
            font-size: 16px;
            color: var(--accent-color);
            font-weight: 600;
            margin-bottom: 12px;
        }
        
        .market-info {
            font-size: 11px;
            color: var(--text-secondary);
            border-top: 1px solid #2c3247;
            padding-top: 10px;
        }

        .start-mining-container {
            margin-bottom: 20px;
        }

        .btn-start-mining {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #00e676 0%, #00b0ff 100%);
            color: #0d0e12;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 230, 118, 0.3);
            transition: all 0.2s;
        }

        .btn-start-mining:disabled {
            background: #1f2330;
            color: #607d8b;
            border: 1px solid #2c3247;
            box-shadow: none;
            cursor: not-allowed;
        }

        .stats-strip {
            background-color: #1f2330;
            border-radius: 14px;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            font-size: 13px;
        }

        .hash-rate {
            color: var(--text-primary);
            font-weight: bold;
        }

        .grid-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 20px;
        }

        .card-option {
            background: #1c1f2b;
            border: 1px solid #282f42;
            border-radius: 18px;
            padding: 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .card-icon {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .card-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 14px;
        }

        .btn {
            width: 100%;
            padding: 11px;
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-top: auto;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-blue { background-color: var(--btn-blue); }
        .btn-blue:hover { background-color: #1976d2; }

        .btn-orange { background-color: var(--btn-orange); }
        .btn-orange:hover { background-color: #f57c00; }

        .btn:disabled {
            background-color: #424242 !important;
            color: #757575;
            cursor: not-allowed;
        }

        .meta-text {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 10px;
        }

        .bottom-nav {
            position: fixed;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #161820;
            width: calc(100% - 30px);
            max-width: 450px;
            height: 65px;
            border-radius: 20px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border: 1px solid #252936;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            z-index: 999;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            width: 20%;
            height: 100%;
            transition: all 0.2s;
            gap: 4px;
        }

        .nav-item .nav-icon {
            font-size: 20px;
        }

        .nav-item.active-nav {
            color: var(--accent-color);
            font-weight: bold;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 10000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-box {
            background: #1c1f2b;
            color: #fff;
            padding: 24px;
            border-radius: 20px;
            border: 1px solid #ff9800;
            text-align: center;
            max-width: 320px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }

        .modal-box p {
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .modal-box button {
            background: linear-gradient(135deg, #ff9800 0%, #ff5722 100%);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            font-size: 14px;
        }

        @keyframes blink {
            0% { opacity: 0.3; }
            50% { opacity: 1; }
            100% { opacity: 0.3; }
        }
    </style>
</head>
<body>

    <!-- 1️⃣ قسم التعدين الرئيسي -->
    <div id="page-mining" class="dashboard active-page">
        <div class="header">
            <div class="logo-section">
                <span class="logo-icon">⚡</span>
                <span class="logo-text">MultiMiner</span>
            </div>
            <div class="status-badge" id="statusBadge">
                <div class="pulse"></div>
                <span id="statusText">متوقف</span>
