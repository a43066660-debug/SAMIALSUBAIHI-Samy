<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MultiMiner - لوحة التحكم</title>
    <style>
        :root {
            --bg-color: #0d0e12;
            --card-bg: #161820;
            --accent-color: #00e676;
            --text-primary: #ffffff;
            --text-secondary: #90a4ae;
            --btn-blue: #2196f3;
            --btn-orange: #ff9800;
            --btn-purple: #9c27b0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Segoe UI, Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        .dashboard {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 480px;
            border-radius: 28px;
            padding: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            border: 1px solid #252936;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-icon {
            font-size: 24px;
            color: var(--accent-color);
        }

        .logo-text {
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        .status-badge {
            background: rgba(244, 67, 54, 0.1);
            color: #f44336;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-badge.active {
            background: rgba(0, 230, 118, 0.1);
            color: var(--accent-color);
        }

        .pulse {
            width: 8px;
            height: 8px;
            background-color: #f44336;
            border-radius: 50%;
        }

        .status-badge.active .pulse {
            background-color: var(--accent-color);
            animation: blink 1.5s infinite;
        }

                .balance-box {
            background: linear-gradient(135deg, #1e2230 0%, #1a1d29 100%);
            border: 1px solid #2c3247;
            border-radius: 20px;
            padding: 22px;
            text-align: center;
            margin-bottom: 20px;
        }

        .balance-label {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .crypto-amount {
            font-size: 26px;
            font-weight: 700;
            color: var(--text-primary);
            font-family: monospace;
            margin-bottom: 4px;
            word-break: break-all;
        }

        .fiat-amount {
            font-size: 16px;
            color: var(--accent-color);
            font-weight: 600;
            margin-bottom: 12px;
        }

        .market-info {
            font-size: 11px;
            color: var(--text-secondary);
            border-top: 1px solid #2c3247;
            padding-top: 10px;
        }

        .start-mining-container {
            margin-bottom: 20px;
        }

        .btn-start-mining {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #00e676 0%, #00b0ff 100%);
            color: #0d0e12;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 230, 118, 0.3);
            transition: all 0.2s;
        }

        .btn-start-mining:disabled {
            background: #1f2330;
            color: #607d8b;
            border: 1px solid #2c3247;
            box-shadow: none;
            cursor: not-allowed;
        }

        .stats-strip {
            background-color: #1f2330;
            border-radius: 14px;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            font-size: 13px;
        }

        .hash-rate {
            color: var(--text-primary);
            font-weight: bold;
        }

        .grid-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 20px;
        }

        .card-option {
            background: #1c1f2b;
            border: 1px solid #282f42;
            border-radius: 18px;
            padding: 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .card-icon {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .card-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 14px;
        }


                .withdraw-section {
            background: #1c1f2b;
            border: 1px solid #282f42;
            border-radius: 20px;
            padding: 18px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .withdraw-title {
            font-size: 14px;
            font-weight: 600;
            text-align: center;
        }

        .wallet-input {
            width: 100%;
            padding: 12px;
            background: #0d0e12;
            border: 1px solid #2c3247;
            border-radius: 10px;
            color: #ffffff;
            font-family: monospace;
            font-size: 13px;
            text-align: center;
            outline: none;
        }

        .wallet-input:focus {
            border-color: var(--btn-purple);
        }

        .btn {
            width: 100%;
            padding: 11px;
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-top: auto;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-blue { background-color: var(--btn-blue); }
        .btn-blue:hover { background-color: #1976d2; }

        .btn-orange { background-color: var(--btn-orange); }
        .btn-orange:hover { background-color: #f57c00; }

        .btn-purple { background-color: var(--btn-purple); }
        .btn-purple:hover { background-color: #7b1fa2; }

        .btn:disabled {
            background-color: #424242 !important;
            color: #757575;
            cursor: not-allowed;
        }

        .meta-text {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 10px;
        }

        @keyframes blink {
            0% { opacity: 0.3; }
            50% { opacity: 1; }
            100% { opacity: 0.3; }
        }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="header">
        <div class="logo-section">
            <span class="logo-icon">⚡</span>
            <span class="logo-text">MultiMiner</span>
        </div>
        <div class="status-badge" id="statusBadge">
            <div class="pulse"></div>
            <span id="statusText">متوقف</span>
        </div>
    </div>

    <div class="balance-box">
        <div class="balance-label">إجمالي الرصيد المستخرج (BTC)</div>
        <div class="crypto-amount" id="cryptoBalance">0.000000000000</div>
        <div class="fiat-amount" id="fiatBalance">$0.00 USD</div>
        <div class="market-info">سعر البيتكوين المرجعي المتزامن: $75,000</div>
    </div>

    <div class="start-mining-container">
        <button class="btn-start-mining" id="startMiningBtn" onclick="startMiningProcess()">اضغط لبدء التعدين (6 ساعات)</button>
    </div>

    <div class="stats-strip">
        <span>المؤقت: <span id="timeCounter">06:00:00</span></span>
        <span>سرعة الهاش: <span class="hash-rate" id="hashRateText">0 TH/s</span></span>
    </div>

    <div class="grid-options">
        <div class="card-option">
            <div class="card-icon">📺</div>
            <div class="card-title">مشاهدة الإعلانات</div>
            <button class="btn btn-blue" id="actionAdBtn" onclick="watchAd()">مطالبة بمكافأة</button>
            <div class="meta-text">عداد المشاهدة: <span id="adCounterText">0</span></div>
        </div>

        <div class="card-option">
            <div class="card-icon">⏳</div>
            <div class="card-title">زيادة وقت التعدين</div>
            <button class="btn btn-orange" id="actionUpgradeBtn" onclick="requestUpgradeAd()">إعلان (+2 س)</button>
            <div class="meta-text">الحد الأقصى الحالي: <span id="maxDurationText">6</span> ساعات</div>
        </div>
    </div>

    <div class="withdraw-section">
        <div class="withdraw-title">💳 سحب الأرباح لمستودعك</div>
        <input type="text" class="wallet-input" id="walletAddress" placeholder="أدخل عنوان محفظة Bitcoin (BTC)">
        <button class="btn btn-purple" onclick="processWithdrawal()">تقديم طلب سحب</button>
        <div class="meta-text" style="text-align: center;">الحد الأدنى للسحب: <span style="font-family: monospace; color:#ff9800;">0.00050000</span> BTC</div>
    </div>
</div>

    <script>
    const adMobAppId = "205859610";

    // جلب البيانات المحفوظة أو استخدام القيم الافتراضية
    let accountBtc = parseFloat(localStorage.getItem("miner_btc")) || 0.000000000000; 
    const standardBtcPrice = 75000;
    let totalAds = parseInt(localStorage.getItem("miner_ads")) || 0;
    let savedWallet = localStorage.getItem("miner_wallet") || "";
    
    // إعدادات وقت التعدين المطور
    let maxMiningSeconds = parseInt(localStorage.getItem("miner_max_seconds")) || 21600; // الافتراضي 6 ساعات (21600 ثانية)
    let remainingTimerSeconds = localStorage.getItem("miner_seconds") !== null ? parseInt(localStorage.getItem("miner_seconds")) : maxMiningSeconds; 

    let isMiningActive = false;
    let currentMiningIncrement = 0.000000000135; 
    let miningInterval = null;

    function saveToLocalStorage() {
        localStorage.setItem("miner_btc", accountBtc);
        localStorage.setItem("miner_ads", totalAds);
        localStorage.setItem("miner_max_seconds", maxMiningSeconds);
        localStorage.setItem("miner_seconds", remainingTimerSeconds);
        localStorage.setItem("miner_wallet", document.getElementById("walletAddress").value);
    }

    function refreshMetricsDisplay() {
        document.getElementById("cryptoBalance").textContent = accountBtc.toFixed(12);
        let calculatedFiat = accountBtc * standardBtcPrice;
        document.getElementById("fiatBalance").textContent = "$" + calculatedFiat.toLocaleString("en-US", {minimumFractionDigits: 2, maximumFractionDigits: 2}) + " USD";
        document.getElementById("adCounterText").textContent = totalAds;
        
        // تحديث واجهة الترقية والوقت الأقصى بالواجهة
        let maxHours = maxMiningSeconds / 3600;
        document.getElementById("maxDurationText").textContent = maxHours;
        
        let startBtn = document.getElementById("startMiningBtn");
        if (!isMiningActive) {
            startBtn.textContent = `اضغط لبدء التعدين (${maxHours} ساعات)`;
        }

        // قفل زر الترقية إذا وصل لـ 24 ساعة
        let upgradeBtn = document.getElementById("actionUpgradeBtn");
        if (maxMiningSeconds >= 86400) { // 24 ساعة = 86400 ثانية
            upgradeBtn.disabled = true;
            upgradeBtn.textContent = "الحد الأقصى";
        } else {
            upgradeBtn.disabled = false;
            upgradeBtn.textContent = "إعلان (+2 س)";
        }
    }

    function formatTime(seconds) {
        let hrs = Math.floor(seconds / 3600);
        let mins = Math.floor((seconds % 3600) / 60);
        let secs = seconds % 60;
        return [
            hrs.toString().padStart(2, "0"),
            mins.toString().padStart(2, "0"),
            secs.toString().padStart(2, "0")
        ].join(":");
    }

    function startMiningProcess() {
        if (isMiningActive) return;
        isMiningActive = true;

        let btn = document.getElementById("startMiningBtn");
        btn.disabled = true;
        btn.textContent = "التعدين نشط حالياً";
        
        document.getElementById("statusBadge").classList.add("active");
        document.getElementById("statusText").textContent = "نشط ومتصل";
        document.getElementById("hashRateText").textContent = "120 TH/s";

        refreshMetricsDisplay();

        miningInterval = setInterval(() => {
            if (remainingTimerSeconds > 0) {
                remainingTimerSeconds--;
                accountBtc += currentMiningIncrement; 
                document.getElementById("timeCounter").textContent = formatTime(remainingTimerSeconds);
                refreshMetricsDisplay();
                saveToLocalStorage(); 
            } else {
                clearInterval(miningInterval);
                isMiningActive = false;
                btn.disabled = false;
                document.getElementById("statusBadge").classList.remove("active");
                document.getElementById("statusText").textContent = "متوقف";
                document.getElementById("hashRateText").textContent = "0 TH/s";
                remainingTimerSeconds = maxMiningSeconds; // إعادة التعيين للحد الأقصى الحالي للمستخدم
                document.getElementById("timeCounter").textContent = formatTime(remainingTimerSeconds);
                refreshMetricsDisplay();
                saveToLocalStorage();
            }
        }, 1000);
    }

    function watchAd() {
        if (window.AppInventor) {
            window.AppInventor.setWebViewString("WATCH_AD");
        } else {
            alert("يرجى تشغيل الكود داخل التطبيق لمشاهدة الإعلانات.");
        }
    }

    function rewardUserForAd() {
        totalAds++;
        accountBtc += 0.000000000500; 
        refreshMetricsDisplay();
        saveToLocalStorage();
        alert("حصلت على مكافأة مشاهدة الإعلان الحقيقي!");
    }

    // إرسال إشارة للـ Kodular لفتح إعلان مكافأة خاص بالترقية
    function requestUpgradeAd() {
        if (maxMiningSeconds >= 86400) {
            alert("لقد وصلت بالفعل للحد الأقصى (24 ساعة)!");
            return;
        }

        if (window.AppInventor) {
            window.AppInventor.setWebViewString("UPGRADE_AD");
        } else {
            alert("يرجى فتح التطبيق لمشاهدة إعلان الترقية وزيادة الوقت.");
        }
    }

    // الدالة المخصصة التي يستدعيها Kodular بعد انتهاء إعلان الترقية بنجاح
    function rewardUserForUpgrade() {
        if (maxMiningSeconds < 86400) {
            maxMiningSeconds += 7200; // زيادة ساعتين (7200 ثانية)
            
            // إذا لم يكن التعدين بدأ بعد، نحدث العداد ليطابق الترقية الجديدة فوراً
            if (!isMiningActive) {
                remainingTimerSeconds = maxMiningSeconds;
                document.getElementById("timeCounter").textContent = formatTime(remainingTimerSeconds);
            }
            
            refreshMetricsDisplay();
            saveToLocalStorage();
            alert("رائع! تم تمديد وقت التعدين الأقصى بمقدار ساعتين إضافيتين.");
        }
    }

    function processWithdrawal() {
        let wallet = document.getElementById("walletAddress").value.trim();
        const minWithdraw = 0.00050000;

        if (wallet === "") {
            alert("يرجى إدخال عنوان محفظة البيتكوين أولاً!");
            return;
        }

        if (accountBtc < minWithdraw) {
            alert("رصيدك الحالي غير كافٍ! الحد الأدنى للسحب هو " + minWithdraw.toFixed(8) + " BTC");
            return;
        }

        if (window.AppInventor) {
            window.AppInventor.setWebViewString("WITHDRAW:" + wallet + ":" + minWithdraw);
            accountBtc -= minWithdraw; 
            refreshMetricsDisplay();
            saveToLocalStorage();
            alert("تم إرسال طلب السحب للتطبيق بنجاح.");
        } else {
            alert("خاصية السحب تعمل فقط من داخل التطبيق المثبت.");
        }
    }

    window.onload = function() {
        document.getElementById("walletAddress").value = savedWallet;
        refreshMetricsDisplay();
        document.getElementById("timeCounter").textContent = formatTime(remainingTimerSeconds);
        
        if (remainingTimerSeconds < maxMiningSeconds && remainingTimerSeconds > 0) {
            startMiningProcess();
        }
    };
    
    document.getElementById("walletAddress").oninput = saveToLocalStorage;
</script>

</body>
</html>
