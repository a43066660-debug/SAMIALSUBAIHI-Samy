<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MultiMiner - لوحة التحكم المطورة</title>
    <style>
        :root {
            --bg-color: #0d0e12;
            --card-bg: #161820;
            --accent-color: #00e676;
            --text-primary: #ffffff;
            --text-secondary: #90a4ae;
            --btn-blue: #2196f3;
            --btn-orange: #ff9800;
            --btn-purple: #9c27b0;
            --nav-bg: #1a1d29;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Segoe UI, Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
            padding-bottom: 85px; /* مسافة للشريط السفلي */
        }

        .dashboard {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 480px;
            border-radius: 28px;
            padding: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            border: 1px solid #252936;
            min-height: 520px;
            display: flex;
            flex-direction: column;
        }

        /* إدارة التنقل بين الصفحات */
        .page {
            display: none;
            animation: fadeIn 0.3s ease-in-out;
            flex-direction: column;
            gap: 15px;
            flex-grow: 1;
        }

        .page.active {
            display: flex;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-icon { font-size: 24px; color: var(--accent-color); }
        .logo-text { font-size: 20px; font-weight: bold; letter-spacing: 0.5px; }

        .status-badge {
            background: rgba(244, 67, 54, 0.1);
            color: #f44336;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-badge.active {
            background: rgba(0, 230, 118, 0.1);
            color: var(--accent-color);
        }

        .pulse { width: 8px; height: 8px; background-color: #f44336; border-radius: 50%; }
        .status-badge.active .pulse { background-color: var(--accent-color); animation: blink 1.5s infinite; }

        /* شريط التنقل السفلي الاحترافي */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 480px;
            background-color: var(--nav-bg);
            border-top: 1px solid #2c3247;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            padding: 12px 0;
            border-radius: 24px 24px 0 0;
            box-shadow: 0 -5px 25px rgba(0,0,0,0.5);
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            font-size: 11px;
            cursor: pointer;
            gap: 5px;
            transition: color 0.2s, transform 0.1s;
        }

        .nav-item.active {
            color: var(--accent-color);
            font-weight: bold;
        }

        .nav-icon { font-size: 22px; }

        /* البطاقات والصناديق التجميلية */
        .balance-box {
            background: linear-gradient(135deg, #1e2230 0%, #1a1d29 100%);
            border: 1px solid #2c3247;
            border-radius: 20px;
            padding: 22px;
            text-align: center;
        }

        .balance-label { font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; }
        .crypto-amount { font-size: 26px; font-weight: 700; color: var(--text-primary); font-family: monospace; margin-bottom: 4px; word-break: break-all; }
        .fiat-amount { font-size: 16px; color: var(--accent-color); font-weight: 600; margin-bottom: 12px; }
        .market-info { font-size: 11px; color: var(--text-secondary); border-top: 1px solid #2c3247; padding-top: 10px; }

        .btn-start-mining {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #00e676 0%, #00b0ff 100%);
            color: #0d0e12;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 230, 118, 0.3);
            transition: all 0.2s;
        }

        .btn-start-mining:disabled { background: #1f2330; color: #607d8b; border: 1px solid #2c3247; box-shadow: none; cursor: not-allowed; }

        .stats-strip {
            background-color: #1f2330;
            border-radius: 14px;
            padding: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
        }

        .hash-rate { color: var(--text-primary); font-weight: bold; }

        .grid-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .card-option {
            background: #1c1f2b;
            border: 1px solid #282f42;
            border-radius: 18px;
            padding: 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .card-icon { font-size: 32px; margin-bottom: 8px; }
        .card-title { font-size: 14px; font-weight: 600; color: var(--text-primary); margin-bottom: 12px; }

        .wallet-input {
            width: 100%;
            padding: 12px;
            background: #0d0e12;
            border: 1px solid #2c3247;
            border-radius: 10px;
            color: #ffffff;
            font-family: monospace;
            font-size: 13px;
            text-align: center;
            outline: none;
        }
        .wallet-input:focus { border-color: var(--btn-purple); }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        .btn:active { transform: scale(0.97); }
        .btn-blue { background-color: var(--btn-blue); }
        .btn-blue:hover { background-color: #1976d2; }
        .btn-orange { background-color: var(--btn-orange); }
        .btn-orange:hover { background-color: #f57c00; }
        .btn-purple { background-color: var(--btn-purple); }
        .btn-purple:hover { background-color: #7b1fa2; }

        .settings-item {
            background: #1c1f2b;
            border: 1px solid #282f42;
            border-radius: 14px;
            padding: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }

        /* مساحة فارغة مخصصة للتصميم المستقبلي في المتصفح */
        .empty-store-container {
            border: 2px dashed #2c3247;
            border-radius: 18px;
            padding: 40px 20px;
            text-align: center;
            color: var(--text-secondary);
            font-size: 13px;
        }

        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="dashboard">
    <!-- الهيدر العلوي المستمر لجميع الصفحات -->
    <div class="header">
        <div class="logo-section">
            <span class="logo-icon">⚡</span>
            <span class="logo-text">MultiMiner</span>
        </div>
        <div class="status-badge" id="statusBadge">
            <div class="pulse"></div>
            <span id="statusText">متوقف</span>
        </div>
    </div>

    <!-- 1. صفحة القائمة الرئيسية (التعدين الحالي والعداد فقط) -->
    <div id="page-home" class="page active">
        <div class="balance-box">
            <div class="balance-label">إجمالي الرصيد المستخرج (BTC)</div>
            <div class="crypto-amount" id="cryptoBalance">0.000000000000</div>
            <div class="fiat-amount" id="fiatBalance">$0.00 USD</div>
            <div class="market-info">سعر البيتكوين المرجعي المتزامن: $75,000</div>
        </div>
        <div class="start-mining-container">
            <button class="btn-start-mining" id="startMiningBtn" onclick="startMiningProcess()">اضغط لبدء التعدين (6 ساعات)</button>
        </div>
        <div class="stats-strip">
            <span>المؤقت: <span id="timeCounter">00:00:00</span></span>
            <span>سرعة الهاش: <span class="hash-rate" id="hashRateText">0 TH/s</span></span>
        </div>
    </div>

    <!-- 2. صفحة المتجر الفارغة تماماً لتضع فيها ما تشاء لاحقاً -->
    <div id="page-store" class="page">
        <div class="empty-store-container">
            📦 صفحة المتجر فارغة حالياً جاهزة للتصميم والتعديلات التي تود إضافتها لاحقاً.
        </div>
    </div>

    <!-- 3. صفحة الأدوات والمكافآت (تحتوي على ترقية العتاد ومشاهدة الإعلانات) -->
    <div id="page-tools" class="page">
        <div class="grid-options">
            <div class="card-option">
                <div class="card-icon">📺</div>
                <div class="card-title">مشاهدة الإعلانات</div>

                <script>
    // ربط معرّف تطبيقك BTC_Flow الموضح بالصورة
    const adMobAppId = "205859610";

    // جلب البيانات المحفوظة أو استخدام القيم الافتراضية
    let accountBtc = parseFloat(localStorage.getItem("miner_btc")) || 0.000000000000; 
    const standardBtcPrice = 75000;
    let totalAds = parseInt(localStorage.getItem("miner_ads")) || 0;
    let minerLevel = parseInt(localStorage.getItem("miner_level")) || 1;
    let savedWallet = localStorage.getItem("miner_wallet") || "";
    
    let isMiningActive = false;
    let currentMiningIncrement = 0.000000000135 + ((minerLevel - 1) * 0.000000000050); 
    let remainingTimerSeconds = parseInt(localStorage.getItem("miner_seconds")) || 21600; 
    let miningInterval = null;

    // دالة التبديل الفوري الذكي بين الصفحات الخمس دون إعادة تحميل التعدين
    function switchPage(pageName) {
        // إخفاء جميع الصفحات
        document.querySelectorAll( .page ).forEach(page => page.classList.remove( active ));
        // إلغاء تفعيل جميع أزرار الشريط السفلي
        document.querySelectorAll( .nav-item ).forEach(item => item.classList.remove( active ));

        // إظهار الصفحة المطلوبة وتفعيل زرها الخاص
        document.getElementById(`page-${pageName}`).classList.add( active );
        document.getElementById(`nav-${pageName}`).classList.add( active );
    }

    // دالة لحفظ البيانات الحالية في المتصفح تلقائياً
    function saveToLocalStorage() {
        localStorage.setItem("miner_btc", accountBtc);
        localStorage.setItem("miner_ads", totalAds);
        localStorage.setItem("miner_level", minerLevel);
        localStorage.setItem("miner_seconds", remainingTimerSeconds);
        localStorage.setItem("miner_wallet", document.getElementById("walletAddress").value);
    }

    // تحديث الأرقام والواجهات البصرية للرصيد بجميع الصفحات في نفس الوقت
    function refreshMetricsDisplay() {
        let btcFormatted = accountBtc.toFixed(12);
        document.getElementById("cryptoBalance").textContent = btcFormatted;
        document.getElementById("walletCryptoBalance").textContent = btcFormatted; // تحديث صفحة المحفظة أيضاً
        
        let calculatedFiat = accountBtc * standardBtcPrice;
        document.getElementById("fiatBalance").textContent = "$" + calculatedFiat.toLocaleString("en-US", {minimumFractionDigits: 2, maximumFractionDigits: 2}) + " USD";
        document.getElementById("adCounterText").textContent = totalAds;
        document.getElementById("levelText").textContent = minerLevel;
    }

    // تحويل الثواني إلى صيغة وقت منظم (00:00:00)
    function formatTime(seconds) {
        let hrs = Math.floor(seconds / 3600);
        let mins = Math.floor((seconds % 3600) / 60);
        let secs = seconds % 60;
        return [
            hrs.toString().padStart(2, "0"),
            mins.toString().padStart(2, "0"),
            secs.toString().padStart(2, "0")
        ].join(":");
    }


                        function startMiningProcess() {
        if (isMiningActive) return;
        isMiningActive = true;

        let btn = document.getElementById("startMiningBtn");
        btn.disabled = true;
        btn.textContent = "التعدين نشط حالياً";
        
        document.getElementById("statusBadge").classList.add("active");
        document.getElementById("statusText").textContent = "نشط ومتصل";
        document.getElementById("hashRateText").textContent = (120 + (minerLevel * 15)) + " TH/s";

        refreshMetricsDisplay();

        miningInterval = setInterval(() => {
            if (remainingTimerSeconds > 0) {
                remainingTimerSeconds--;
                accountBtc += currentMiningIncrement; 
                document.getElementById("timeCounter").textContent = formatTime(remainingTimerSeconds);
                refreshMetricsDisplay();
                saveToLocalStorage(); 
            } else {
                clearInterval(miningInterval);
                isMiningActive = false;
                btn.disabled = false;
                btn.textContent = "اضغط لبدء التعدين (6 ساعات)";
                document.getElementById("statusBadge").classList.remove("active");
                document.getElementById("statusText").textContent = "متوقف";
                document.getElementById("hashRateText").textContent = "0 TH/s";
                remainingTimerSeconds = 21600;
                saveToLocalStorage();
            }
        }, 1000);
    }

    // إرسال إشارة للـ Blocks بـ Kodular لتشغيل إعلان مكافأة حقيقي
    function watchAd() {
        if (window.AppInventor) {
            window.AppInventor.setWebViewString("WATCH_AD");
        } else {
            alert("يرجى تشغيل الكود داخل التطبيق لمشاهدة الإعلانات.");
        }
    }

    // الدالة المربوطة بحدث انتهاء الإعلان لزيادة رصيدك تلقائياً
    function rewardUserForAd() {
        totalAds++;
        accountBtc += 0.000000000500; 
        refreshMetricsDisplay();
        saveToLocalStorage();
        alert("حصلت على مكافأة مشاهدة الإعلان الحقيقي!");
    }

    function upgradeHardware() {
        let cost = 0.000000002000 * minerLevel;
        if (accountBtc >= cost) {
            accountBtc -= cost;
            minerLevel++;
            currentMiningIncrement += 0.000000000050;
            refreshMetricsDisplay();
            if (isMiningActive) {
                document.getElementById("hashRateText").textContent = (120 + (minerLevel * 15)) + " TH/s";
            }
            saveToLocalStorage();
        } else {
            alert("الرصيد غير كافٍ للترقية!");
        }
    }

    // تقديم طلب السحب وإبلاغ بلكات Kodular سحابياً
    function processWithdrawal() {
        let wallet = document.getElementById("walletAddress").value.trim();
        const minWithdraw = 0.00050000;

        if (wallet === "") {
            alert("يرجى إدخال عنوان محفظة البيتكوين أولاً!");
            return;
        }

        if (accountBtc < minWithdraw) {
            alert("رصيدك الحالي غير كافٍ! الحد الأدنى للسحب هو " + minWithdraw.toFixed(8) + " BTC");
            return;
        }

        if (window.AppInventor) {
            window.AppInventor.setWebViewString("WITHDRAW:" + wallet + ":" + minWithdraw);
            accountBtc -= minWithdraw; 
            refreshMetricsDisplay();
            saveToLocalStorage();
            alert("تم إرسال طلب السحب للتطبيق بنجاح.");
        } else {
            alert("خاصية السحب تعمل فقط من داخل التطبيق المثبت.");
        }
    }

    // دالة مسح البيانات لإعادة تشغيل الحساب من الصفر
    function resetAllData() {
        if (confirm("هل أنت متأكد تماماً من رغبتك في مسح كافة البيانات وتصفير الأرصدة؟")) {
            localStorage.clear();
            accountBtc = 0;
            totalAds = 0;
            minerLevel = 1;
            remainingTimerSeconds = 21600;
            document.getElementById("walletAddress").value = "";
            if (miningInterval) clearInterval(miningInterval);
            isMiningActive = false;
            
            let btn = document.getElementById("startMiningBtn");
            btn.disabled = false;
            btn.textContent = "اضغط لبدء التعدين (6 ساعات)";
            document.getElementById("statusBadge").classList.remove("active");
            document.getElementById("statusText").textContent = "متوقف";
            document.getElementById("hashRateText").textContent = "0 TH/s";
            
            refreshMetricsDisplay();
            document.getElementById("timeCounter").textContent = formatTime(remainingTimerSeconds);
            alert("تم مسح كافة البيانات بنجاح.");
        }
    }

    window.onload = function() {
        document.getElementById("walletAddress").value = savedWallet;
        refreshMetricsDisplay();
        document.getElementById("timeCounter").textContent = formatTime(remainingTimerSeconds);
        
        if (remainingTimerSeconds < 21600 && remainingTimerSeconds > 0) {
            startMiningProcess();
        }
    };
    
    document.getElementById("walletAddress").oninput = saveToLocalStorage;
</script>

</body>
</html>
