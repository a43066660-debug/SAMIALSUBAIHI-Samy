<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>مكون الطقس</title>
    <style>
        @import url( https://googleapis.com );
        
        body {
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 90vh;
            background-color: #ffffff;
            font-family:  Cairo , sans-serif;
        }

        /* تصميم مستطيل ومقرب وثابت 100% مطابق للصورة التي أرسلتها */
        .twk-weather-widget {
            display: inline-flex;
            align-items: center;
            background-color: rgba(240, 243, 248, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 35px; 
            padding: 14px 28px 14px 32px; 
            gap: 16px; 
            user-select: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            direction: rtl;
            width: max-content;
            box-sizing: border-box;
        }
        
        .twk-main-content {
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }

        .twk-text {
            color: #2c2c2c;
            font-size: 22px; 
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }
        
        .twk-sun-icon {
            width: 26px; 
            height: 26px;
            background-color: #FFB300;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 10px rgba(255, 179, 0, 0.8);
            flex-shrink: 0;
        }
        
        .twk-arrow-container {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 24px; 
            height: 24px;
            flex-shrink: 0;
        }

        .twk-arrow-svg {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>
<body>

    <!-- المكون الآن ثابت ويعمل مباشرة بدون سكربتات معطلة -->
    <div class="twk-weather-widget">
        <div class="twk-main-content">
            <span class="twk-sun-icon"></span>
            <span class="twk-text">
                <span style="font-weight: 700; display: inline-block; direction: ltr;">30</span>
                <span>درجة - صحو في الرياض الآن</span>
            </span>
        </div>
        
        <span class="twk-arrow-container">
            <svg class="twk-arrow-svg" viewBox="0 0 24 24" fill="none" xmlns="http://w3.org">
                <path d="M15 19L8 12L15 5" stroke="#8E8E93" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </span>
    </div>

</body>
</html>
