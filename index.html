<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MultiMiner Top Section</title>
    <style>
        body {
            background-color: #0b0e14;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 15px;
            user-select: none;
        }
        .container {
            background-color: #121620;
            border-radius: 16px;
            padding: 20px;
            border: 1px solid #1a2235;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        .status {
            background-color: rgba(46, 204, 113, 0.15);
            color: #2ecc71;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
        }
        .title {
            font-size: 20px;
            font-weight: bold;
            color: #f1c40f;
        }
        .balance-box {
            text-align: center;
            background-color: #171d2c;
            border-radius: 12px;
            padding: 22px;
            margin-bottom: 18px;
        }
        .balance-title { color: #8a99ad; font-size: 13px; }
        .btc-val { font-size: 26px; font-weight: bold; margin: 12px 0; letter-spacing: 0.5px; }
        .usd-val { color: #2ecc71; font-weight: bold; font-size: 17px; }
        .ref-price { color: #58667e; font-size: 11px; margin-top: 10px; }
        .mining-status {
            text-align: center;
            background-color: #171d2c;
            padding: 14px;
            border-radius: 12px;
            color: #a29bfe;
            font-weight: bold;
            font-size: 15px;
            margin-bottom: 18px;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: #bdc3c7;
            background-color: #171d2c;
            padding: 14px;
            border-radius: 12px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <span id="statusText" class="status">● نشط ومتصل</span>
        <span class="title">⚡ MultiMiner</span>
    </div>

    <div class="balance-box">
        <div class="balance-title">إجمالي الرصيد المستخرج (BTC)</div>
        <div id="btcBalance" class="btc-val">0.000000369640</div>
        <div id="usdBalance" class="usd-val">USD $0.03</div>
        <div class="ref-price">سعر البيتكوين المرجعي المتزامن: $75,000</div>
    </div>

    <div class="mining-status" id="mainStatus">التعدين نشط حالياً</div>

    <div class="info-row">
        <div>المؤقت: <span id="timer">05:19:36</span></div>
        <div>سرعة الهاش: <span id="hashRate">120 TH/s</span></div>
    </div>
</div>

<script>
    let btc = 0.000000369640;
    let baseSpeed = 120;
    let multiplier = 1;
    let seconds = 19176;
    let isMining = true;

    setInterval(() => {
        if (!isMining) return;

        btc += (0.000000005 * multiplier);
        document.getElementById('btcBalance').innerText = btc.toFixed(12);
        document.getElementById('usdBalance').innerText = "USD $" + (btc * 75000).toFixed(2);

        if (seconds > 0) {
            seconds--;
            let h = Math.floor(seconds / 3600).toString().padStart(2, '0');
            let m = Math.floor((seconds % 3600) / 60).toString().padStart(2, '0');
            let s = (seconds % 60).toString().padStart(2, '0');
            document.getElementById('timer').innerText = `${h}:${m}:${s}`;
        } else {
            stopMining();
        }
    }, 1000);

    function stopMining() {
        isMining = false;
        document.getElementById('mainStatus').innerText = "التعدين متوقف! يرجى زيادة الوقت";
        document.getElementById('mainStatus').style.color = "#e74c3c";
        document.getElementById('statusText').innerText = "○ متوقف";
        document.getElementById('statusText').style.color = "#e74c3c";
        document.getElementById('statusText').style.backgroundColor = "rgba(231, 76, 60, 0.15)";
    }

    function increaseSpeed(value) {
        multiplier = value;
        document.getElementById('hashRate').innerText = (baseSpeed * multiplier) + " TH/s";
    }

    function addMiningTime(hours) {
        seconds += (hours * 3600);
        isMining = true;
        document.getElementById('mainStatus').innerText = "التعدين نشط حالياً";
        document.getElementById('mainStatus').style.color = "#a29bfe";
        document.getElementById('statusText').innerText = "● نشط ومتصل";
        document.getElementById('statusText').style.color = "#2ecc71";
        document.getElementById('statusText').style.backgroundColor = "rgba(46, 204, 113, 0.15)";
    }
</script>
</body>
</html>
