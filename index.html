
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم محاكاة التعدين</title>
    <script src="https://jsdelivr.net"></script>
    <script src="https://tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans">

    <div class="flex h-screen">
        <!-- القائمة الجانبية -->
        <aside class="w-64 bg-gray-800 p-6 flex flex-col justify-between">
            <div>
                <h2 class="text-2xl font-bold text-yellow-500 mb-8 text-center">CryptoMinerSim 🚀</h2>
                <nav class="space-y-4">
                    <a href="#" class="block py-2.5 px-4 rounded bg-gray-700 text-white font-semibold">الرئيسية</a>
                    <a href="#" class="block py-2.5 px-4 rounded hover:bg-gray-700 text-gray-400 hover:text-white transition">غرفة التعدين</a>
                    <a href="#" class="block py-2.5 px-4 rounded hover:bg-gray-700 text-gray-400 hover:text-white transition">المتجر الافتراضي</a>
                    <a href="#" class="block py-2.5 px-4 rounded hover:bg-gray-700 text-gray-400 hover:text-white transition">المحفظة</a>
                </nav>
            </div>
            <div class="text-xs text-gray-500 text-center">نسخة محاكاة تجريبية v1.0</div>
        </aside>

        <!-- المحتوى الرئيسي -->
        <main class="flex-1 p-8 overflow-y-auto">
            <!-- الهيدر -->
            <header class="flex justify-between items-center mb-8">
                <h1 class="text-3xl font-semibold">لوحة التحكم العامة</h1>
                <button class="bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded-full font-bold shadow-lg transition">
                    ▶ بدء المحاكاة
                </button>
            </header>

            <!-- بطاقات الإحصائيات -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-md">
                    <p class="text-gray-400 text-sm">الرصيد الافتراضي الحالي</p>
                    <p class="text-2xl font-bold text-yellow-500 mt-2">0.024560 BTC</p>
                </div>
                <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-md">
                    <p class="text-gray-400 text-sm">سرعة الهاش الحالية</p>
                    <p class="text-2xl font-bold text-blue-400 mt-2">450.5 MH/s</p>
                </div>
                <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-md">
                    <p class="text-gray-400 text-sm">حالة الأجهزة الافتراضية</p>
                    <p class="text-2xl font-bold text-green-400 mt-2">4 / 4 نشط</p>
                </div>
            </div>

            <!-- الرسم البياني للأرباح -->
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-md mb-8">
                <h3 class="text-lg font-medium mb-4">نمو الأرباح الافتراضية (آخر 7 أيام)</h3>
                <canvas id="earningsChart" class="w-full h-64"></canvas>
            </div>
        </main>
    </div>

    <!-- كود تشغيل الرسم البياني -->
    <script>
        const ctx = document.getElementById( earningsChart ).getContext( 2d );
        new Chart(ctx, {
            type:  line ,
            data: {
                labels: [ السبت ,  الأحد ,  الإثنين ,  الثلاثاء ,  الأربعاء ,  الخميس ,  الجمعة ],
                datasets: [{
                    label:  الأرباح المحاكات ,
                    data: [5, 12, 19, 25, 32, 45, 60],
                    borderColor:  #f59e0b ,
                    backgroundColor:  rgba(245, 158, 11, 0.1) ,
                    borderWidth: 3,
                    fill: true,
                    tension: 0.3
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { display: false } },
                scales: {
                    y: { grid: { color:  #374151  }, ticks: { color:  #9ca3af  } },
                    x: { grid: { color:  #374151  }, ticks: { color:  #9ca3af  } }
                }
            }
        });
    </script>
</body>
</html>
