<!-- استدعاء مكتبات Firebase المتوافقة -->
<script src="https://gstatic.com"></script>
<script src="https://gstatic.com"></script>

<style>
    body { background-color: #fce4ec; font-family: sans-serif; text-align: center; color: #4a148c; margin: 0; padding: 0; }
    .header { background: white; padding: 20px; border-radius: 0 0 25px 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    .balance { font-size: 28px; font-weight: bold; color: #ff4081; margin: 10px 0; letter-spacing: 1px; }
    .cards-container { display: flex; flex-wrap: wrap; justify-content: space-around; padding: 15px; }
    .card { background: white; border-radius: 20px; width: 44%; padding: 15px; margin-bottom: 15px; box-shadow: 0 6px 12px rgba(0,0,0,0.08); }
    .btn-action { background: #00c853; color: white; border: none; padding: 12px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; }
    .icon { font-size: 35px; margin-bottom: 8px; }
</style>

<div class="header">
    <div style="color: #888; font-size: 12px;">ACCOUNT ID: 1214834</div>
    <div class="balance" id="btc-balance">0.000000000000</div>
    <div style="font-size: 14px; background: #fff3e0; display: inline-block; padding: 5px 15px; border-radius: 15px; color: #e65100;">1 BTC ≈ $63,450</div>
</div>

<div class="cards-container">
    <div class="card">
        <div class="icon">⚡</div>
        <b>تعدين سحابي</b>
        <p style="font-size: 11px; color: #666;">عقد نشط لمدة ساعتين</p>
        <div style="color: #00c853; font-weight: bold; margin-bottom: 8px;">7.5 Gh/s</div>
        <button class="btn-action" id="mineBtn" onclick="startMining()">تشغيل</button>
    </div>
    
    <div class="card">
        <div class="icon">🎁</div>
        <b>مكافأة</b>
        <p style="font-size: 11px; color: #666;">شاهد واربح فوراً</p>
        <div style="color: #00c853; font-weight: bold; margin-bottom: 8px;">+0.0005</div>
        <button class="btn-action" style="background: #2196f3;">احصل الآن</button>
    </div>
</div>

<script>
  // بيانات مشروعك BTC Flow مع الرابط الصحيح لقاعدة البيانات
  const firebaseConfig = {
    apiKey: "AIzaSyCPC3sataoP06zEjA0ryOq9Gj5smFau0vo",
    authDomain: "://firebaseapp.com",
    databaseURL: "https://firebaseio.com", // تم التعديل هنا ليعمل الحفظ
    projectId: "btc-flow-e6768",
    storageBucket: "btc-flow-e6768.firebasestorage.app",
    appId: "1:863164678519:web:30bb2cef0d6eb9a3f56172"
  };

  // تهيئة Firebase
  if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
  }
  const database = firebase.database();
  let userId = "user_1214834"; 
  let currentBalance = 0;

  // جلب الرصيد المحفوظ عند فتح التطبيق
  database.ref( users/  + userId).on( value , (snapshot) => {
    if (snapshot.exists()) {
      currentBalance = snapshot.val().balance;
      document.getElementById( btc-balance ).innerText = currentBalance.toFixed(12);
    }
  });

  // وظيفة التعدين والحفظ في السيرفر
  function startMining() {
    document.getElementById( mineBtn ).innerText = "جاري التعدين...";
    document.getElementById( mineBtn ).style.background = "#ffa000";
    
    setInterval(() => {
      currentBalance += 0.000000000125;
      document.getElementById( btc-balance ).innerText = currentBalance.toFixed(12);
      
      // إرسال الرصيد الجديد لقاعدة البيانات
      database.ref( users/  + userId).set({
        balance: currentBalance
      });
    }, 3000); // تحديث كل 3 ثوانٍ
  }
</script>
