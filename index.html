<script>
    async function getLiveLocationWeather() {
        try {
            // جلب الإحداثيات التلقائية بناءً على عنوان الـ IP الفعلي الحالي للمستخدم لضمان دقة المدينة
            const locRes = await fetch( https://ipapi.co );
            const locData = await locRes.json();
            
            const lat = locData.latitude || 24.6877; // الرياض كقيمة افتراضية احتياطية
            const lon = locData.longitude || 46.7219;
            const city = locData.city || "الرياض"; 
            
            // طلب بيانات الطقس الحالية والدرجة المحسوسة الحقيقية من الخادم الصحيح
            const weatherUrl = `https://open-meteo.com{lat}&longitude=${lon}&current=temperature_2m,apparent_temperature,weather_code&timezone=auto`;
            const res = await fetch(weatherUrl);
            const data = await res.json();
            
            // استخدام درجة الحرارة المحسوسة الحقيقية التي يشعر بها الإنسان فعلياً
            const realTemp = Math.round(data.current.apparent_temperature);
            const code = data.current.weather_code;
            
            // تحديد الحالة الجوية باللغة العربية
            let status = "صحو"; 
            if (code > 0 && code <= 3) status = "غائم جزئياً"; 
            else if (code >= 45 && code <= 48) status = "ضبابي"; 
            else if (code >= 51 && code <= 67) status = "أمطار"; 
            else if (code >= 95) status = "عواصف";
            
            const wordDeg = "درجة";
            const wordNow = "الآن";
            
            // تحديث واجهة المكون بالدرجة والمدينة الحقيقية الحالية للمستخدم مع إصلاح علامات الاقتباس للمعرفات
            document.getElementById( twk-temp ).innerText = realTemp;
            document.getElementById( twk-status ).innerHTML = " " + wordDeg + " - " + status + " في " + city + " " + wordNow;
        } catch (e) {
            console.log("Error loading dynamic location weather, fallback applied.", e);
        }
    }
    getLiveLocationWeather();
</script>
