
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>واجهة العرض الرقمية</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family:  Segoe UI , Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            width: 90%;
            max-width: 500px;
            text-align: center;
        }

        /* تصميم المكونات العلوية والمؤشرات */
        .hardware-display {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 10px;
        }

        .gpu-mock {
            width: 120px;
            height: 60px;
            background-color: #1a1a1a;
            border-radius: 8px;
            border: 2px solid #333;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 5px;
        }

        .fan {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 3px dashed #555;
            background: radial-gradient(circle, #333 20%, transparent 25%);
        }

        .node-mock {
            width: 40px;
            height: 40px;
            background-color: #111;
            border: 2px solid #444;
            position: relative;
        }

        .node-inner {
            width: 80%;
            height: 30%;
            background: linear-gradient(90deg, #4a148c, #7b1fa2);
            position: absolute;
            top: 35%;
            left: 10%;
        }

        /* النصوص والأرقام */
        .title {
            font-size: 20px;
            color: #e0e0e0;
            margin-bottom: 10px;
            border-bottom: 2px dashed #555;
            display: inline-block;
            padding-bottom: 5px;
        }

        .counter {
            font-size: 36px;
            font-weight: bold;
            letter-spacing: 2px;
            color: #ffffff;
            margin-top: 10px;
            font-family: monospace;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- القسم العلوي للمحاكاة البصرية -->
    <div class="hardware-display">
        <div class="node-mock">
            <div class="node-inner"></div>
        </div>
        
        <div class="gpu-mock">
            <div class="fan"></div>
            <div class="fan"></div>
        </div>
    </div>

    <!-- النصوص التوضيحية -->
    <div class="title">الرصيد (BTC)</div>
    <div class="counter">0028262882400000.0</div>
</div>

</body>
</html>
