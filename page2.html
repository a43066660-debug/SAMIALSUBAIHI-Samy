
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الصفحة الثانية</title>
    <style>
        body {
            background-color: #0b0e11;
            color: #ffffff;
            font-family: Segoe UI, Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding-top: 100px;
            margin: 0;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
            background-color: #161a20;
            padding: 30px;
            border-radius: 20px;
            border: 1px solid #252d3a;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
        }
        h1 {
            color: #00e676;
            font-size: 24px;
            margin-bottom: 15px;
        }
        p {
            color: #90a4ae;
            font-size: 16px;
            line-height: 1.6;
        }
        .back-btn {
            display: inline-block;
            margin-top: 25px;
            padding: 10px 20px;
            background-color: #00e676;
            color: #0b0e11;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            transition: 0.3s;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>مرحباً بك في الصفحة الثانية</h1>
        <p>تم إنشاء هذه الصفحة بنجاح ومتناسقة مع ألوان موقعك الأساسي.</p>
        <a href="index.html" class="back-btn">العودة للرئيسية</a>
    </div>

</body>
</html>
