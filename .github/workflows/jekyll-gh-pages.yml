<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكون الطقس</title>
    <style>
        /* استيراد خط مشابه للخط المستخدم في التطبيق */
        @import url('https://googleapis.com');

        body {
            background-color: #f4f6f9; /* خلفية افتراضية للتطبيق للتوضيح */
            font-family: 'Cairo', sans-serif;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        /* حاوية الطقس الرئيسية */
        .weather-widget {
            display: inline-flex;
            align-items: center;
            background-color: rgba(240, 243, 248, 0.7); /* خلفية رمادية فاتحة شبه شفافة */
            border-radius: 20px; /* زوايا دائرية ناعمة */
            padding: 4px 14px; /* مسافات داخلية مطابقة للحجم في الصورة */
            gap: 6px; /* مسافة بين النص والأيقونة والسهم */
            cursor: pointer;
            transition: background 0.2s;
            user-select: none;
            border: 1px solid rgba(255, 255, 255, 0.5); /* حواف ناعمة جداً */
        }

        .weather-widget:hover {
            background-color: rgba(230, 235, 242, 0.9);
        }

        /* نص الطقس والمدينة */
        .weather-text {
            color: #333333; /* لون النص الرمادي الغامق */
            font-size: 13px;
            font-weight: 600;
        }

        /* أيقونة الشمس */
        .weather-icon {
            width: 16px;
            height: 16px;
            background-color: #FFB300; /* لون الشمس البرتقالي/الأصفر */
            border-radius: 50%;
            display: inline-block;
            position: relative;
            box-shadow: 0 0 6px #FFB300;
        }

        /* سهم الانتقال لليسار (>) */
        .arrow-icon {
            color: #8E8E93; /* لون السهم الرمادي الفاتح */
            font-size: 11px;
            font-weight: bold;
            margin-right: 2px;
            font-family: monospace; /* لضمان استقامة السهم */
        }
    </style>
</head>
<body>

    <!-- المكون البرمجي للطقس -->
    <div class="weather-widget">
        <span class="weather-icon"></span>
        <span class="weather-text">30 درجة - صحو في الرياض الآن</span>
        <span class="arrow-icon">&lt;</span>
    </div>

</body>
</html>
